<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Gene Boo · 3D Interactive Lab · Single File</title>
<meta name="description" content="Gene Boo 3D Lab with enhanced arcade, synth, drum machine, reactive floor, coin pedestal, and catchable falling objects." />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
:root{--primary:#FF006E;--secondary:#3A86FF;--accent:#FFBE0B;--bg:#05050A;--panel:rgba(8,8,14,.96)}
*{box-sizing:border-box;margin:0;padding:0} html,body{width:100%;height:100%} body{overflow:hidden;background:var(--bg);color:#fff;font-family:'Roboto Mono',monospace;user-select:none;-webkit-tap-highlight-color:transparent} canvas{display:block} #bg{position:fixed;inset:0;background:#05050A url('https://www.transparenttextures.com/patterns/cartographer.png');background-size:320px;opacity:.35;z-index:0;pointer-events:none} #three-container{position:fixed;inset:0;z-index:1;cursor:grab} #three-container.pointer-cursor{cursor:crosshair}
#brand-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;background:linear-gradient(180deg,rgba(0,0,0,.92),transparent);pointer-events:none}.brand-left{display:flex;gap:12px;align-items:center;pointer-events:auto}.brand-face{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);box-shadow:0 0 22px var(--accent);animation:face 6s ease-in-out infinite}@keyframes face{0%,100%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-7px) rotate(4deg) scale(1.06)}50%{transform:translateY(4px) rotate(-4deg) scale(.97)}75%{transform:translateY(-2px) rotate(2deg) scale(1.03)}}.brand-title{font-family:'Playfair Display';font-size:1.6rem;font-weight:700;background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.brand-subtitle{font-size:.7rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase}.nav{display:flex;gap:8px;flex-wrap:wrap;pointer-events:auto}.nav button,#switcher,#lbbtn{font-family:'Orbitron';font-size:.72rem;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:9px 13px;cursor:pointer;backdrop-filter:blur(10px);text-decoration:none}.nav button:hover,#switcher:hover,#lbbtn:hover{background:var(--primary);border-color:var(--primary);transform:translateY(-2px)}#switcher{pointer-events:auto} #lbbtn{position:fixed;right:18px;bottom:18px;z-index:25;color:var(--accent);border-color:var(--accent)}#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:15;color:rgba(255,255,255,.75);font-family:'Orbitron';font-size:.74rem;letter-spacing:1.8px;text-shadow:0 0 12px var(--secondary);pointer-events:none;text-align:center;animation:pulse 2.5s infinite}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
#overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.66);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:.3s}#overlay.active{opacity:1;pointer-events:auto}#panel{width:min(1080px,93vw);max-height:86vh;overflow:auto;background:var(--panel);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:28px;box-shadow:0 25px 80px rgba(0,0,0,.85),inset 0 0 0 1px rgba(255,255,255,.05)}#close{position:sticky;top:0;float:right;width:42px;height:42px;border:0;border-radius:50%;font-size:28px;background:rgba(255,255,255,.12);color:white;cursor:pointer;z-index:2}#close:hover{background:var(--primary);transform:rotate(90deg)}.modal-title{font-family:'Playfair Display';font-size:clamp(1.8rem,4vw,3rem);background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}.modal-subtitle{color:var(--accent);font-family:'Orbitron';font-size:.85rem;letter-spacing:2px;margin:5px 0 18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.12)}.modal-body{font-family:'Lato';line-height:1.7;color:rgba(255,255,255,.86)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:18px}.card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px}.card:hover{border-color:var(--accent);transform:translateY(-3px)}.ico{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary),var(--secondary));font-size:20px;margin-bottom:10px}.links{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.links a,.arcbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-family:'Lato';font-weight:700;cursor:pointer;min-height:40px}.links a:hover,.arcbtn:hover{background:var(--secondary);color:#000}.arcade{width:100%;min-height:390px;background:radial-gradient(circle at 40% 0%,rgba(255,0,110,.18),#08080f 55%);border:2px solid var(--secondary);border-radius:16px;padding:18px;font-family:'Orbitron';text-align:center;box-shadow:inset 0 0 40px rgba(0,229,255,.12),0 0 32px rgba(0,0,0,.55)}.arc-title{font-size:1.45rem;color:var(--accent);text-shadow:0 0 15px currentColor;margin-bottom:10px}.hudrow{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;color:#ddd;font-size:.82rem;margin:8px 0}.gamecanvas{max-width:100%;background:#080812;border:2px solid rgba(255,255,255,.18);border-radius:12px;box-shadow:0 0 22px rgba(0,229,255,.12)}.lbtable{width:100%;border-collapse:collapse;font-family:'Orbitron';margin-top:14px}.lbtable th,.lbtable td{border-bottom:1px solid rgba(255,255,255,.13);padding:9px;text-align:left}.lbtable th{color:var(--accent)}.initials{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:12px}.initials input{width:90px;text-align:center;text-transform:uppercase;font-family:'Orbitron';font-size:1.2rem;background:#05050a;color:#fff;border:2px solid var(--accent);border-radius:8px;padding:10px}.padgrid{display:grid;grid-template-columns:repeat(4,minmax(58px,1fr));gap:10px;max-width:430px;margin:14px auto}.drumpad{aspect-ratio:1;border:2px solid rgba(255,255,255,.22);background:linear-gradient(135deg,#242436,#07070a);border-radius:16px;color:#fff;font-family:'Orbitron';cursor:pointer;box-shadow:inset 0 0 24px rgba(0,0,0,.6);touch-action:manipulation}.drumpad.active,.drumpad:focus{background:var(--accent);color:#000;box-shadow:0 0 24px var(--accent);outline:2px solid #fff;transform:scale(.96)}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:12px auto;max-width:720px}.ctrl{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.13);border-radius:12px;padding:12px;text-align:left;font-size:.75rem}.ctrl label{display:flex;justify-content:space-between;color:rgba(255,255,255,.75);margin-bottom:7px}.ctrl input,.ctrl select{width:100%}.piano{position:relative;display:flex;justify-content:center;height:212px;margin:12px auto;touch-action:none}.whitekey,.blackkey{border-radius:0 0 10px 10px;border:1px solid rgba(255,255,255,.25);display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:.65rem;white-space:pre-line;cursor:pointer}.whitekey{width:42px;height:190px;background:linear-gradient(#fff,#ddd);color:#111}.blackkey{position:absolute;width:27px;height:118px;background:linear-gradient(#222,#000);color:#fff;z-index:4}.whitekey.active,.blackkey.active,.whitekey:focus,.blackkey:focus{background:var(--accent);box-shadow:0 0 25px var(--accent);transform:translateY(3px);outline:none}.touchhelp{color:#999;font-size:.75rem;margin-top:8px}@media(max-width:860px){.nav{display:none}.brand-title{font-size:1.15rem}#panel{padding:18px 12px}.piano{transform:scale(.86);transform-origin:top center;height:188px}.whitekey{width:34px}.blackkey{width:22px}.padgrid{gap:7px}#hint{font-size:.62rem;width:92%;white-space:normal}}
</style>
</head>
<body>
<div id="bg"></div><div id="three-container"></div>
<header id="brand-header"><div class="brand-left"><img class="brand-face" src="assets/Gene-removebg-preview.png" alt="Gene Boo" onerror="this.style.display='none'"/><div><div class="brand-title">Gene Boo</div><div class="brand-subtitle">Math · Code · Sound</div></div></div><nav class="nav"><button data-go="main">Main Hall</button><button data-go="engineer">Engineer's Desk</button><button data-go="writer">Writer's Desk</button><button data-go="arcade">Arcade</button></nav><a id="switcher" href="index.html">Classic View</a></header>
<div id="hint">Drag to orbit · Click floor for ripples · Double-click empty floor for volcanic explosions · Click falling objects</div><button id="lbbtn">🏆 LEADERBOARD</button>
<div id="overlay"><div id="panel"><button id="close">×</button><div id="inner"></div></div></div>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>

if(!window.THREE){document.body.innerHTML='<div style="padding:30px;color:white;background:#05050A;font-family:monospace"><h1>Three.js did not load</h1><p>This single-file build does not need a local server, but it still needs internet access to load Three.js from CDN. If you want a truly fully offline file, download and place three.min.js + OrbitControls.js locally.</p></div>';throw new Error('THREE missing');}
// ---------- DOM ----------
const container=document.getElementById('three-container'), overlay=document.getElementById('overlay'), inner=document.getElementById('inner'), closeBtn=document.getElementById('close'), hint=document.getElementById('hint');
const root=document.documentElement.style;

// ---------- LEADERBOARD ----------
const LB='gene_arcade_leaderboard_v3';
const gameNames={game_synth:'Synth Lab',game_drums:'Drum Machine',game_pong:'Neon Pong',game_letters:'Letter Rain',game_racer:'Neon Racer',game_1943:'1943 Powerups',game_breakout:'Plasma Breakout',game_snake:'Circuit Snake',game_memory:'Memory Match'};
function loadLB(){try{return JSON.parse(localStorage.getItem(LB))||{}}catch{return {}}}
function saveLB(db){localStorage.setItem(LB,JSON.stringify(db))}
function addScore(id,ini,score){const db=loadLB();db[id]??=[];db[id].push({ini:String(ini||'GBD').toUpperCase().slice(0,3).padEnd(3,'X'),score:Math.round(score),date:new Date().toISOString().slice(0,10)});db[id].sort((a,b)=>b.score-a.score);db[id]=db[id].slice(0,10);saveLB(db)}
function submitHTML(id,score){return `<div class="initials"><strong>SCORE ${Math.round(score)}</strong><input id="ini" maxlength="3" value="GBD"/><button class="arcbtn" id="saveScore">SAVE INITIALS</button><button class="arcbtn" id="showOneLb">SHOW TABLE</button></div>`}
function wireSubmit(id,score){document.getElementById('ini')?.focus();document.getElementById('saveScore')?.addEventListener('click',()=>{addScore(id,document.getElementById('ini')?.value,score);inner.innerHTML=leaderboardHTML(id)});document.getElementById('showOneLb')?.addEventListener('click',()=>inner.innerHTML=leaderboardHTML(id));}
function leaderboardHTML(one=null){const db=loadLB();const ids=one?[one]:Object.keys(gameNames);let h=`<div class="modal-title">🏆 Arcade Leaderboards</div><div class="modal-subtitle">3-letter initials · persistent local arcade scores</div>`;ids.forEach(id=>{h+=`<h3 style="font-family:Orbitron;color:var(--accent);margin-top:18px">${gameNames[id]||id}</h3><table class="lbtable"><thead><tr><th>#</th><th>INI</th><th>SCORE</th><th>DATE</th></tr></thead><tbody>`;const rows=db[id]||[];if(!rows.length)h+=`<tr><td colspan="4" style="color:#888">No scores yet.</td></tr>`;rows.forEach((r,i)=>h+=`<tr><td>${i+1}</td><td>${r.ini}</td><td>${r.score}</td><td>${r.date}</td></tr>`);h+=`</tbody></table>`});return h}
document.getElementById('lbbtn').onclick=()=>openHTML(leaderboardHTML());

// ---------- THREE SCENE ----------
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2('#05050A',.014);
const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,.1,140); camera.position.set(0,7,17);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; renderer.toneMapping=THREE.ACESFilmicToneMapping; container.appendChild(renderer.domElement);
const controls=new THREE.OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.dampingFactor=.06; controls.maxPolarAngle=Math.PI/2+.18; controls.minDistance=3; controls.maxDistance=42; controls.target.set(0,2,0);
scene.add(new THREE.AmbientLight('#222244',1.6)); const spot=new THREE.SpotLight('#fff',45,55,Math.PI/4.5,.45,1); spot.position.set(0,18,0); spot.castShadow=true; scene.add(spot);
const raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2(); const interactive=[]; const fallingHitboxes=[]; const updatables=[]; let hovered=null, hoveredGroup=null;

function label(text,pos,color='#fff'){const c=document.createElement('canvas');c.width=760;c.height=128;const x=c.getContext('2d');x.font='bold 44px Orbitron';x.textAlign='center';x.textBaseline='middle';x.fillStyle=color;x.shadowColor=color;x.shadowBlur=18;x.fillText(text,380,64);const tex=new THREE.CanvasTexture(c);const s=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false}));s.position.copy(pos);s.scale.set(4.7,.78,1);s.renderOrder=10;scene.add(s);return s}
function addHit(group,id,r=1.5){const h=new THREE.Mesh(new THREE.SphereGeometry(r,18,18),new THREE.MeshBasicMaterial({visible:false}));h.userData={id,group};group.add(h);interactive.push(h);return h}
function neonStation({id,name,color,x,z,type='box',w=1.7,h=2.5,d=1.4}){const g=new THREE.Group();g.position.set(x,1.3,z);g.userData={hovered:false,color,isInteractiveGroup:true};scene.add(g);let geo= type==='sphere'?new THREE.SphereGeometry(1.05,32,22):type==='cone'?new THREE.ConeGeometry(.95,2.9,36):type==='octa'?new THREE.OctahedronGeometry(1.25):new THREE.BoxGeometry(w,h,d);const mat=new THREE.MeshStandardMaterial({color:'#101018',metalness:.8,roughness:.28,emissive:color,emissiveIntensity:.18});const m=new THREE.Mesh(geo,mat);m.castShadow=true;g.add(m);const e=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color,transparent:true,opacity:.7}));g.add(e);const l=new THREE.PointLight(color,2.4,8);l.position.y=1.2;g.add(l);addHit(g,id,Math.max(w,h,d)*.8);label(name.toUpperCase(),new THREE.Vector3(x,4.2,z),color);updatables.push(t=>{g.rotation.y+=.006;g.position.y=1.3+Math.sin(t*1.8+x)*.08;mat.emissiveIntensity=g.userData.hovered?.8:.18;l.intensity=g.userData.hovered?7:2.4;e.material.opacity=g.userData.hovered?1:.55});return g}

// ---------- Dynamic gradient floor with waves/ripples/explosions ----------
const floorSize=54, floorSeg=110; const floorGeo=new THREE.PlaneGeometry(floorSize,floorSize,floorSeg,floorSeg); floorGeo.rotateX(-Math.PI/2);
const floorCanvas=document.createElement('canvas'); floorCanvas.width=floorCanvas.height=768; const fctx=floorCanvas.getContext('2d'); const floorTex=new THREE.CanvasTexture(floorCanvas); floorTex.wrapS=floorTex.wrapT=THREE.RepeatWrapping;
const floorMat=new THREE.MeshStandardMaterial({map:floorTex,color:'#fff',roughness:.35,metalness:.45,emissive:'#050505',emissiveIntensity:.16,side:THREE.DoubleSide});
const floor=new THREE.Mesh(floorGeo,floorMat); floor.position.y=-.55; floor.receiveShadow=true; floor.userData.floor=true; scene.add(floor);
const grid=new THREE.GridHelper(floorSize,floorSeg,'#FF006E','#273052'); grid.position.y=-.51; grid.material.transparent=true; grid.material.opacity=.42; scene.add(grid);
const origY=new Float32Array(floorGeo.attributes.position.array); const ripples=[]; const volcanoes=[];
function drawFloorTexture(t){const g=fctx.createRadialGradient(384+Math.sin(t*.35)*130,330+Math.cos(t*.28)*110,10,384,384,570);g.addColorStop(0,`hsl(${(t*45)%360},90%,35%)`);g.addColorStop(.35,`hsl(${(t*45+90)%360},88%,20%)`);g.addColorStop(.7,`hsl(${(t*45+180)%360},90%,12%)`);g.addColorStop(1,'#030306');fctx.fillStyle=g;fctx.fillRect(0,0,768,768);for(let i=0;i<22;i++){fctx.strokeStyle=`hsla(${(t*70+i*19)%360},95%,60%,.12)`;fctx.lineWidth=1+i%3;fctx.beginPath();const y=(i*41+t*35)%768;fctx.moveTo(0,y);for(let x=0;x<768;x+=24)fctx.lineTo(x,y+Math.sin(x*.016+t+i)*18);fctx.stroke();}floorTex.needsUpdate=true}
function addRipple(v){ripples.push({x:v.x,z:v.z,t:0,str:.65});}
function addVolcano(v){volcanoes.push({x:v.x,z:v.z,t:0});spawnFirework(v.x,2.5,v.z);for(let i=0;i<5;i++)setTimeout(()=>spawnFirework(v.x,2.2+i*.4,v.z,new THREE.Color().setHSL(Math.random(),1,.55)),i*80)}

// ---------- Particles/fireworks/golden spit ----------
const pCount=900,pGeo=new THREE.BufferGeometry(),pPos=new Float32Array(pCount*3),pCol=new Float32Array(pCount*3),pVel=new Float32Array(pCount*3),pLife=new Float32Array(pCount);for(let i=0;i<pCount;i++){pPos[i*3+1]=-99;pCol[i*3]=pCol[i*3+1]=pCol[i*3+2]=1}pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));pGeo.setAttribute('color',new THREE.BufferAttribute(pCol,3));const pMat=new THREE.PointsMaterial({size:.115,vertexColors:true,transparent:true,opacity:.92,blending:THREE.AdditiveBlending,depthWrite:false});const particles=new THREE.Points(pGeo,pMat);scene.add(particles);
function burst(cx,cy,cz,n=90,gold=false){let used=0;for(let i=0;i<pCount&&used<n;i++){if(pLife[i]<=0){const col=gold?new THREE.Color().setHSL(.12+Math.random()*.04,1,.55+Math.random()*.3):new THREE.Color().setHSL(Math.random(),1,.58);pPos[i*3]=cx;pPos[i*3+1]=cy;pPos[i*3+2]=cz;const sp=.6+Math.random()*2.4,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);pVel[i*3]=Math.sin(ph)*Math.cos(th)*sp;pVel[i*3+1]=Math.cos(ph)*sp+Math.random()*.6;pVel[i*3+2]=Math.sin(ph)*Math.sin(th)*sp;pCol[i*3]=col.r;pCol[i*3+1]=col.g;pCol[i*3+2]=col.b;pLife[i]=1.4+Math.random()*1.8;used++}}pGeo.attributes.position.needsUpdate=true;pGeo.attributes.color.needsUpdate=true}
function spawnFirework(x=(Math.random()-.5)*25,y=Math.random()*9+3,z=(Math.random()-.5)*25,col=null){burst(x,y,z,110,false)} window.spawnFirework=spawnFirework;

// ---------- Coin pedestal with photo ----------
const texLoader=new THREE.TextureLoader();const coin=new THREE.Group();coin.position.set(0,5.6,-6.5);coin.userData={hovered:false,isInteractiveGroup:true,spinBoost:0,hue:0};scene.add(coin);
const coinMat=new THREE.MeshStandardMaterial({color:'#FFBE0B',metalness:1,roughness:.12,emissive:'#6b4100',emissiveIntensity:.7});const coinBack=new THREE.Mesh(new THREE.CylinderGeometry(2.65,2.65,.32,128),coinMat);coinBack.rotation.x=Math.PI/2;coinBack.castShadow=true;coin.add(coinBack);
const faceTex=texLoader.load('assets/Gene-removebg-preview.png',()=>{},undefined,()=>{});faceTex.colorSpace=THREE.SRGBColorSpace;const face=new THREE.Mesh(new THREE.CircleGeometry(2.32,128),new THREE.MeshBasicMaterial({map:faceTex,transparent:true,toneMapped:false,color:'#fff'}));face.position.z=.19;coin.add(face);
const halo=new THREE.Mesh(new THREE.TorusGeometry(3.05,.07,20,140),new THREE.MeshBasicMaterial({color:'#FFBE0B',transparent:true,opacity:.92,depthWrite:false}));coin.add(halo);const clight=new THREE.PointLight('#FFBE0B',8,16);clight.position.set(0,0,1.6);coin.add(clight);addHit(coin,'resume',3.2);label('CVs & LETTERS',new THREE.Vector3(0,8.8,-6.5),'#FFBE0B');
const goldGeo=new THREE.BufferGeometry(),goldN=220,goldPos=new Float32Array(goldN*3),goldPhase=new Float32Array(goldN);for(let i=0;i<goldN;i++){goldPhase[i]=Math.random()*Math.PI*2}goldGeo.setAttribute('position',new THREE.BufferAttribute(goldPos,3));const goldPts=new THREE.Points(goldGeo,new THREE.PointsMaterial({color:'#ffd166',size:.08,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,depthWrite:false}));coin.add(goldPts);
updatables.push(t=>{coin.userData.hue=(coin.userData.hue+.0025)%1;const c=new THREE.Color().setHSL(coin.userData.hue,.95,.55);coinMat.color.copy(c);coinMat.emissive.copy(c).multiplyScalar(.35);halo.material.color.copy(c);clight.color.copy(c);coin.rotation.y+=.012+coin.userData.spinBoost;coin.rotation.z=Math.sin(t*.75)*.05;coin.position.y=5.7+Math.sin(t*1.7)*.45;coin.scale.setScalar(1.12+Math.sin(t*2.8)*.08+(coin.userData.hovered?.18:0));coin.userData.spinBoost=Math.max(0,coin.userData.spinBoost*.94-.001);const arr=goldGeo.attributes.position.array;for(let i=0;i<goldN;i++){const p=goldPhase[i],r=2.9+Math.sin(t*1.4+p)*.55,a=t*(1.15+coin.userData.spinBoost*8)+p;arr[i*3]=Math.cos(a)*r;arr[i*3+1]=Math.sin(t*2+p)*.9;arr[i*3+2]=Math.sin(a)*r}goldGeo.attributes.position.needsUpdate=true;if(Math.random()<.006+coin.userData.spinBoost*.04)burst(coin.position.x,coin.position.y,coin.position.z,20,true)});

// ---------- Room layout/stations: menu portals + richer desk graphics ----------
label('MAIN HALL',new THREE.Vector3(0,6.4,0),'#FFBE0B');

// About crystal
neonStation({id:'about',name:'About',color:'#3A86FF',x:-4,z:1,type:'sphere'});

function initBreakout(){const [c,x,keys]=initCanvasKeys();let paddle={x:c.width/2-50,y:c.height-24,w:100},balls=[{x:c.width/2,y:c.height-70,vx:3.2,vy:-3.6}],score=0,level=1,br=[];function make(){br=[];for(let r=0;r<6;r++)for(let col=0;col<10;col++)br.push({x:35+col*50,y:35+r*24,w:44,h:16,hue:(r*45+col*12)%360})}make();c.addEventListener('mousemove',e=>paddle.x=e.offsetX-paddle.w/2);c.addEventListener('touchmove',e=>{const r=c.getBoundingClientRect();paddle.x=e.touches[0].clientX-r.left-paddle.w/2;e.preventDefault()},{passive:false});function loop(){x.fillStyle='#070711';x.fillRect(0,0,c.width,c.height);paddle.x=Math.max(0,Math.min(c.width-paddle.w,paddle.x));balls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<6||b.x>c.width-6)b.vx*=-1;if(b.y<6)b.vy*=-1;if(b.y>c.height)b.dead=true;if(b.y>paddle.y-7&&b.x>paddle.x&&b.x<paddle.x+paddle.w){const rel=(b.x-(paddle.x+paddle.w/2))/(paddle.w/2);b.vx+=rel*2;b.vy=-Math.abs(b.vy)}br.forEach(k=>{if(!k.dead&&b.x>k.x&&b.x<k.x+k.w&&b.y>k.y&&b.y<k.y+k.h){k.dead=true;b.vy*=-1;score+=40;if(Math.random()<.08)balls.push({x:b.x,y:b.y,vx:-b.vx,vy:b.vy})}})});balls=balls.filter(b=>!b.dead);br=br.filter(k=>!k.dead);if(!balls.length){finishGame('game_breakout',score);return}if(!br.length){level++;score+=500;make();balls=[{x:c.width/2,y:c.height-70,vx:3.2+level*.2,vy:-3.7-level*.2}]}br.forEach(k=>{x.fillStyle=`hsl(${k.hue},90%,55%)`;x.fillRect(k.x,k.y,k.w,k.h)});x.fillStyle='#00E5FF';x.fillRect(paddle.x,paddle.y,paddle.w,10);balls.forEach(b=>{x.fillStyle='#FFBE0B';x.beginPath();x.arc(b.x,b.y,7,0,Math.PI*2);x.fill()});document.getElementById('score').textContent=`Score ${score}`;document.getElementById('level').textContent=`Level ${level}`;document.getElementById('status').textContent=`Balls ${balls.length}`;gameRAF=requestAnimationFrame(loop)}loop()}
function initSnake(){
  const [c,x,keys]=initCanvasKeys();
  c.focus();

  const cell=20;
  const cols=Math.floor(c.width/cell);
  const rows=Math.floor(c.height/cell);

  let snake=[
    {x:12,y:8},
    {x:11,y:8},
    {x:10,y:8}
  ];

  let dir={x:1,y:0};
  let next={x:1,y:0};
  let food={x:18,y:9};
  let score=0;
  let dead=false;
  let last=0;
  let started=false;
  let paused=false;
  let touchStart=null;

  function setDir(dx,dy){
    if(dead) return;

    // Prevent instant reverse into self
    if(dir.x===-dx && dir.y===-dy) return;

    next={x:dx,y:dy};
    started=true;
    c.focus();
  }

  const localKey=e=>{
    const k=e.key.toLowerCase();

    if(['arrowleft','a'].includes(k)){
      e.preventDefault();
      setDir(-1,0);
    }

    if(['arrowright','d'].includes(k)){
      e.preventDefault();
      setDir(1,0);
    }

    if(['arrowup','w'].includes(k)){
      e.preventDefault();
      setDir(0,-1);
    }

    if(['arrowdown','s'].includes(k)){
      e.preventDefault();
      setDir(0,1);
    }

    if(k===' ' || k==='p'){
      e.preventDefault();
      paused=!paused;
      c.focus();
    }

    if(dead && k==='enter'){
      e.preventDefault();
      initGame('game_snake');
    }
  };

  document.addEventListener('keydown',localKey);
  addCleanup(()=>document.removeEventListener('keydown',localKey));

  // Mouse / pointer steering:
  // click relative to the snake head to choose direction.
  c.addEventListener('pointerdown',e=>{
    c.focus();
    started=true;

    const r=c.getBoundingClientRect();
    const mx=e.clientX-r.left;
    const my=e.clientY-r.top;

    const head=snake[0];
    const hx=head.x*cell+cell/2;
    const hy=head.y*cell+cell/2;

    const dx=mx-hx;
    const dy=my-hy;

    if(Math.abs(dx)>Math.abs(dy)){
      setDir(dx>0?1:-1,0);
    }else{
      setDir(0,dy>0?1:-1);
    }
  });

  // Touch swipe steering.
  c.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    if(!t) return;

    touchStart={x:t.clientX,y:t.clientY};
    c.focus();
    started=true;
  },{passive:true});

  c.addEventListener('touchmove',e=>{
    if(!touchStart || !e.touches[0]) return;

    const t=e.touches[0];
    const dx=t.clientX-touchStart.x;
    const dy=t.clientY-touchStart.y;

    if(Math.hypot(dx,dy)>24){
      if(Math.abs(dx)>Math.abs(dy)){
        setDir(dx>0?1:-1,0);
      }else{
        setDir(0,dy>0?1:-1);
      }

      touchStart={x:t.clientX,y:t.clientY};
    }

    e.preventDefault();
  },{passive:false});

  function newFood(){
    let f;

    do{
      f={
        x:Math.floor(Math.random()*cols),
        y:Math.floor(Math.random()*rows)
      };
    }while(snake.some(s=>s.x===f.x && s.y===f.y));

    return f;
  }

  function drawGrid(){
    x.strokeStyle='rgba(0,229,255,.08)';
    x.lineWidth=1;

    for(let gx=0; gx<c.width; gx+=cell){
      x.beginPath();
      x.moveTo(gx,0);
      x.lineTo(gx,c.height);
      x.stroke();
    }

    for(let gy=0; gy<c.height; gy+=cell){
      x.beginPath();
      x.moveTo(0,gy);
      x.lineTo(c.width,gy);
      x.stroke();
    }
  }

  function loop(t){
    x.fillStyle='#05050a';
    x.fillRect(0,0,c.width,c.height);

    drawGrid();

    if(started && !paused && !dead && t-last>105){
      last=t;
      dir=next;

      const head={
        x:snake[0].x+dir.x,
        y:snake[0].y+dir.y
      };

      const hitWall =
        head.x<0 ||
        head.y<0 ||
        head.x>=cols ||
        head.y>=rows;

      const hitSelf = snake.some(s=>s.x===head.x && s.y===head.y);

      if(hitWall || hitSelf){
        dead=true;
        finishGame('game_snake',score);
      }else{
        snake.unshift(head);

        if(head.x===food.x && head.y===food.y){
          score+=100;
          food=newFood();
        }else{
          snake.pop();
        }
      }
    }

    // Food pulse
    const pulse=1+Math.sin(t*.012)*.18;

    x.fillStyle='#FFBE0B';
    x.shadowColor='#FFBE0B';
    x.shadowBlur=14;
    x.beginPath();
    x.arc(
      food.x*cell+cell/2,
      food.y*cell+cell/2,
      8*pulse,
      0,
      Math.PI*2
    );
    x.fill();
    x.shadowBlur=0;

    // Snake body
    snake.forEach((s,i)=>{
      x.fillStyle=i===0?'#00E5FF':`hsl(${140+i*8},90%,50%)`;
      x.fillRect(
        s.x*cell+2,
        s.y*cell+2,
        cell-4,
        cell-4
      );
    });

    if(!started){
      x.fillStyle = 'rgba(0,0,0,.62)';
      x.fillRect(0, 0, c.width, c.height);

      x.fillStyle = '#00E5FF';
      x.font = '22px Orbitron';
      x.textAlign = 'center';

      x.fillText(
        'CLICK / TAP / ARROW KEYS TO START',
        c.width / 2,
        c.height / 2 - 8
      );

      x.fillStyle = '#aaa';
      x.font = '13px Orbitron';

      x.fillText(
        'Arrow keys or WASD · Click direction · Swipe on touch · P to pause',
        c.width / 2,
        c.height / 2 + 24
      );

      x.textAlign = 'left';
    }

    if(paused && !dead){
      x.fillStyle='rgba(0,0,0,.55)';
      x.fillRect(0,0,c.width,c.height);

      x.fillStyle='#FFBE0B';
      x.font='28px Orbitron';
      x.textAlign='center';
      x.fillText('PAUSED',c.width/2,c.height/2);
      x.textAlign='left';
    }

    if(dead){
      x.fillStyle='rgba(0,0,0,.55)';
      x.fillRect(0,0,c.width,c.height);

      x.fillStyle='#FF006E';
      x.font='28px Orbitron';
      x.textAlign='center';
      x.fillText('GAME OVER',c.width/2,c.height/2-10);

      x.fillStyle='#fff';
      x.font='13px Orbitron';
      x.fillText('Press ENTER to restart',c.width/2,c.height/2+22);
      x.textAlign='left';
    }

    document.getElementById('score').textContent=`Score ${score}`;
    document.getElementById('level').textContent=`Length ${snake.length}`;
    document.getElementById('status').textContent=
      dead ? 'Game over' :
      paused ? 'Paused' :
      started ? 'Running' :
      'Waiting for input';

    if(!dead){
      gameRAF=requestAnimationFrame(loop);
    }
  }

  gameRAF=requestAnimationFrame(loop);
}
function initMemoryDX(){const sy=['⚡','🎵','📊','🧠','🚀','🎲','💎','🔥'];const deck=[...sy,...sy].sort(()=>Math.random()-.5),grid=document.getElementById('memgrid');let first=null,lock=false,matched=0,moves=0,score=1000;deck.forEach(s=>{const b=document.createElement('button');b.className='drumpad';b.textContent='?';b.dataset.s=s;b.onclick=()=>{if(lock||b.classList.contains('matched')||b===first)return;b.textContent=s;b.classList.add('active');if(!first){first=b;return}moves++;score-=10;if(first.dataset.s===s){first.classList.add('matched');b.classList.add('matched');first=null;matched++;score+=150;if(matched===8)finishGame('game_memory',score)}else{lock=true;setTimeout(()=>{first.textContent='?';b.textContent='?';first.classList.remove('active');b.classList.remove('active');first=null;lock=false},650)}document.getElementById('score').textContent=`Score ${score}`;document.getElementById('status').textContent=`Moves ${moves}`};grid.appendChild(b)})}

// ---------- Interaction ----------
function setHover(obj){if(hovered===obj)return;if(hoveredGroup)hoveredGroup.userData.hovered=false;hovered=obj;hoveredGroup=obj?.userData.group||obj?.parent||null;if(hoveredGroup)hoveredGroup.userData.hovered=true}
function rayFrom(x,y){mouse.x=x/innerWidth*2-1;mouse.y=-(y/innerHeight)*2+1;raycaster.setFromCamera(mouse,camera)}
function clickWorld(x,y,isDouble=false){if(overlay.classList.contains('active'))return;rayFrom(x,y);let hits=raycaster.intersectObjects([...interactive,...fallingHitboxes],true);if(hits.length){const obj=hits[0].object;if(obj.userData.id==='faller'){const sp=obj.userData.sprite;burst(sp.position.x,sp.position.y,sp.position.z,80,false);sp.position.y=24;sp.position.x=(Math.random()-.5)*44;sp.position.z=(Math.random()-.5)*50;return}const id=obj.userData.id;const group=obj.userData.group;const wp=new THREE.Vector3();group?.getWorldPosition(wp);if(id==='resume'){coin.userData.spinBoost=.08;burst(wp.x,wp.y,wp.z,120,true);for(let i=0;i<4;i++)setTimeout(()=>burst(wp.x,wp.y,wp.z,60,true),i*90)}else burst(wp.x,wp.y,wp.z,70,false);openId(id);return}let fh=raycaster.intersectObject(floor,true);if(fh.length){if(isDouble)addVolcano(fh[0].point);else addRipple(fh[0].point)}}
window.addEventListener('mousemove',e=>{if(overlay.classList.contains('active'))return;rayFrom(e.clientX,e.clientY);const hits=raycaster.intersectObjects([...interactive,...fallingHitboxes],true);if(hits.length){setHover(hits[0].object);container.classList.add('pointer-cursor')}else{setHover(null);container.classList.remove('pointer-cursor')}});
window.addEventListener('click',e=>{if(e.target.closest('#brand-header')||e.target.closest('#lbbtn'))return;clickWorld(e.clientX,e.clientY,false)});window.addEventListener('dblclick',e=>{if(e.target.closest('#brand-header')||e.target.closest('#lbbtn'))return;clickWorld(e.clientX,e.clientY,true)});window.addEventListener('touchstart',e=>{if(e.touches[0])clickWorld(e.touches[0].clientX,e.touches[0].clientY,false)},{passive:true});
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{const m={main:[[0,7,17],[0,2,0]],engineer:[[15,7,10],[9,2,1]],writer:[[-15,7,10],[-9,2,1]],arcade:[[0,8,-18],[0,2,-30]]}[b.dataset.go];camera.position.set(...m[0]);controls.target.set(...m[1]);controls.update()});

// ---------- Animate ----------
const clock=new THREE.Clock();function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();controls.update();updatables.forEach(fn=>fn(t));drawFloorTexture(t);const arr=floorGeo.attributes.position.array;for(let i=0;i<arr.length;i+=3){const x=arr[i],z=arr[i+2];let y=origY[i+1]+Math.sin(x*.45+t*1.3)*Math.cos(z*.37+t*.8)*.18+Math.sin((x+z)*.72+t*2.1)*.11+Math.cos(Math.hypot(x,z)*.65-t*1.6)*.08;ripples.forEach(r=>{const d=Math.hypot(x-r.x,z-r.z);y+=Math.sin(d*2.6-r.t*10)*Math.exp(-d*.28)*Math.max(0,1-r.t/2.4)*r.str});volcanoes.forEach(v=>{const d=Math.hypot(x-v.x,z-v.z);y+=Math.exp(-d*d*.22)*Math.sin(v.t*12)*Math.max(0,1-v.t/1.5)*1.4});arr[i+1]=y}floorGeo.attributes.position.needsUpdate=true;ripples.forEach(r=>r.t+=.016);volcanoes.forEach(v=>v.t+=.016);for(let i=ripples.length-1;i>=0;i--)if(ripples[i].t>2.4)ripples.splice(i,1);for(let i=volcanoes.length-1;i>=0;i--)if(volcanoes[i].t>1.5)volcanoes.splice(i,1);const hue=(t*.04)%1;grid.material.color.setHSL((hue+.14)%1,.95,.58);spot.color.setHSL((hue+.1)%1,.85,.68);for(let i=0;i<pCount;i++){if(pLife[i]>0){pLife[i]-=.016;pPos[i*3]+=pVel[i*3]*.016;pPos[i*3+1]+=pVel[i*3+1]*.016;pPos[i*3+2]+=pVel[i*3+2]*.016;pVel[i*3+1]-=.018;if(pLife[i]<=0)pPos[i*3+1]=-99}}pGeo.attributes.position.needsUpdate=true;fallers.forEach(sp=>{sp.position.y-=sp.userData.speed;sp.material.rotation+=sp.userData.spin;if(sp.position.y<.5){sp.position.y=22+Math.random()*9;sp.position.x=(Math.random()-.5)*44;sp.position.z=(Math.random()-.5)*50}});if(Math.random()<.02&&fallers.length<80)spawnFaller();renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
