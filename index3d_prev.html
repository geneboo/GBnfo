<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Gene Boo · 3D Interactive Lab · Augmented</title>
  <meta name="description" content="Gene Boo — Interactive 3D portfolio exploring mathematics, high-performance engineering, quantitative modeling, sonic art, games, and creative tools." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@300;400;700&family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary-color: #FF006E;
      --secondary-color: #3A86FF;
      --accent-color: #FFBE0B;
      --bg-dark: #05050A;
      --panel-bg: rgba(10,10,15,0.95);
      --bg-pattern: url('https://www.transparenttextures.com/patterns/cartographer.png');
      --floor-glow: #FF006E;
      --floor-color2: #3A86FF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .vogue-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-color: var(--bg-dark);
      background-image: var(--bg-pattern);
      background-size: 300px 300px;
      opacity: 0.38;
      pointer-events: none;
      transition: background-image 0.6s;
    }
    #three-container { position: fixed; inset: 0; z-index: 1; cursor: grab; }
    #three-container:active { cursor: grabbing; }
    #three-container.pointer-cursor { cursor: crosshair; }
    canvas { display: block; }

    #brand-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 20; pointer-events: none;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    }
    .brand-left { display: flex; align-items: center; gap: 12px; }
    .brand-face {
      width: 44px; height: 44px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(255,255,255,0.4); box-shadow: 0 0 18px rgba(255,190,11,.35);
      animation: face-anim 6s ease-in-out infinite; flex-shrink: 0; will-change: transform;
    }
    @keyframes face-anim {
      0%,100%{transform:translateY(0)rotate(0deg)scale(1)skewX(0deg);} 12%{transform:translateY(-8px)rotate(5deg)scale(1.06)skewX(1deg);} 25%{transform:translateY(3px)rotate(-3deg)scale(0.94)skewX(-1deg);} 37%{transform:translateY(-5px)rotate(2deg)scale(1.04)skewX(0.5deg);} 50%{transform:translateY(4px)rotate(-4deg)scale(0.96)skewX(-0.5deg);} 62%{transform:translateY(-3px)rotate(1deg)scale(1.02)skewX(0deg);} 75%{transform:translateY(2px)rotate(-2deg)scale(0.98)skewX(-0.3deg);} 87%{transform:translateY(-1px)rotate(3deg)scale(1.01)skewX(0.2deg);}
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
    .brand-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; font-weight: 700; }
    .brand-subtitle { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--accent-color); letter-spacing: 2.5px; text-transform: uppercase; }
    #switcher-btn { pointer-events: auto; display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); color: #fff; padding: 11px 22px; border-radius: 30px; font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); min-height: 44px; }
    #switcher-btn:hover { background: var(--primary-color); border-color: var(--primary-color); transform: translateY(-3px); box-shadow: 0 10px 30px rgba(255,0,110,0.4); }

    #theme-dots { position: fixed; top: 100px; right: 16px; z-index: 22; display: flex; flex-direction: column; gap: 8px; }
    .theme-dot { width: 13px; height: 13px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.35); transition: all 0.3s; }
    .theme-dot:hover, .theme-dot.active { border-color: #fff; box-shadow: 0 0 14px currentColor; transform: scale(1.35); }

    #hud-hint { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 15; pointer-events: none; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2.5px; color: rgba(255,255,255,0.7); text-shadow: 0 0 12px rgba(0,229,255,0.6); animation: hint-pulse 2.5s infinite; white-space: nowrap; }
    @keyframes hint-pulse { 0%,100%{opacity:0.35;} 50%{opacity:0.95;} }

    #content-overlay { position: fixed; z-index: 50; inset: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.62); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.4s ease; }
    #content-overlay.active { opacity: 1; pointer-events: auto; }
    #content-panel { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 35px 28px; max-width: 960px; width: 92vw; max-height: 84vh; overflow-y: auto; box-shadow: 0 20px 70px rgba(0,0,0,0.85), inset 0 0 0 1px rgba(255,255,255,0.05); transform: translateY(30px) scale(0.98); transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275); position: relative; }
    #content-overlay.active #content-panel { transform: translateY(0) scale(1); }
    #panel-close { position: sticky; top: 0; float: right; background: rgba(255,255,255,0.13); border: none; color: #fff; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; z-index: 100; margin-left: 12px; }
    #panel-close:hover { background: var(--primary-color); transform: rotate(90deg) scale(1.05); }
    .modal-title { font-family: 'Playfair Display', serif; font-size: clamp(1.7rem,4vw,2.8rem); margin-bottom: 6px; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .modal-subtitle { color: var(--accent-color); font-family: 'Space Mono', monospace; font-size: 0.85rem; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; }
    .modal-body { font-family: 'Lato', sans-serif; font-size: 0.98rem; line-height: 1.75; color: rgba(255,255,255,0.86); }
    .modal-body p { margin-bottom: 12px; }
    .links-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .links-grid a { display: inline-flex; align-items: center; gap: 7px; padding: 10px 16px; background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.18); color: #fff; text-decoration: none; font-family: 'Lato', sans-serif; font-size: 0.8rem; font-weight: 700; border-radius: 6px; transition: all 0.3s; min-height: 40px; }
    .links-grid a:hover { background: var(--secondary-color); color: #000; border-color: var(--secondary-color); transform: translateY(-2px); }
    .modal-card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(245px, 1fr)); gap: 16px; margin-top: 20px; clear: both; }
    .modal-card { background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 18px 16px; transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s; }
    .modal-card:hover { transform: translateY(-4px); border-color: var(--accent-color); box-shadow: 0 10px 30px rgba(0,0,0,0.35); }
    .modal-card-icon { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); margin-bottom: 12px; font-size: 20px; }
    .modal-card h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 8px; color: #fff; }
    .modal-card p { color: rgba(255,255,255,0.76); font-family: 'Lato', sans-serif; font-size: 0.9rem; line-height: 1.55; }

    .arcade-container { width: 100%; min-height: 365px; background: #0a0a0f; border: 2px solid var(--secondary-color); border-radius: 8px; margin-top: 16px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; padding: 16px; box-shadow: inset 0 0 30px rgba(0,229,255,.1); }
    .quant-btn { padding: 14px 28px; font-size: 1.05rem; margin: 8px; cursor: pointer; border: none; border-radius: 6px; font-family: 'Orbitron', sans-serif; font-weight: bold; transition: all 0.2s; min-height: 44px; }
    .quant-btn:hover { transform: scale(1.05); }
    .btn-buy { background: #00E5FF; color: #000; }
    .btn-sell { background: #FF006E; color: #fff; }
    .synth-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 92%; max-width: 430px; }
    .synth-pad { aspect-ratio: 1.2; background: #1a1a1a; border: 2px solid #444; border-radius: 6px; cursor: pointer; transition: all 0.08s; min-height: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #888; font-family: 'Orbitron', sans-serif; white-space: pre-line; }
    .synth-pad.active { background: var(--accent-color); box-shadow: 0 0 24px var(--accent-color); border-color: #fff; color: #000; font-weight: bold; }
    .waveform-select { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; justify-content: center; }
    .wave-btn { padding: 7px 12px; font-size: 0.65rem; cursor: pointer; border: 1px solid #555; border-radius: 14px; background: #1a1a1a; color: #ccc; font-family: 'Orbitron', sans-serif; transition: all 0.2s; min-height: 36px; }
    .wave-btn.active-wave { background: var(--secondary-color); color: #000; border-color: var(--secondary-color); box-shadow: 0 0 12px var(--secondary-color); }
    .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 90%; max-width: 320px; }
    .memory-card { aspect-ratio: 1; background: #1a1a2e; border: 2px solid #444; border-radius: 6px; cursor: pointer; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.25s; min-height: 55px; }
    .memory-card.flipped { background: #2a2a4e; border-color: var(--accent-color); }
    .memory-card.matched { background: #0a3a0a; border-color: #0f0; cursor: default; }
    #content-panel::-webkit-scrollbar { width: 6px; }
    #content-panel::-webkit-scrollbar-track { background: transparent; }
    #content-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 3px; }

    @media (max-width: 768px) {
      .brand-title { font-size: 1.2rem; }
      .brand-face { width: 34px; height: 34px; }
      #switcher-btn { padding: 8px 14px; font-size: 0.7rem; }
      #content-panel { padding: 18px 12px; max-height: 88vh; }
      .modal-card-grid { grid-template-columns: 1fr; }
      .synth-grid { grid-template-columns: repeat(5,1fr); gap: 4px; max-width: 340px; }
      .synth-pad { font-size: 0.45rem; min-height: 30px; }
      .memory-grid { max-width: 260px; gap: 5px; }
      .memory-card { font-size: 1.3rem; min-height: 42px; }
      .quant-btn { padding: 10px 18px; font-size: 0.9rem; }
      #theme-dots { top: 85px; right: 6px; gap: 5px; }
      .theme-dot { width: 10px; height: 10px; }
      #hud-hint { font-size: .62rem; letter-spacing: 1px; width: 94%; text-align: center; white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="vogue-bg" id="vogue-bg"></div>
  <div id="three-container"></div>

  <header id="brand-header">
    <div class="brand-left">
      <img class="brand-face" src="assets/Gene-removebg-preview.png" alt="Gene Boo" loading="eager" />
      <div class="brand-text">
        <div class="brand-title">Gene Boo</div>
        <div class="brand-subtitle">Math · Code · Sound</div>
      </div>
    </div>
    <a href="index.html" id="switcher-btn"><i class="fas fa-arrow-left"></i> Classic View</a>
  </header>

  <div id="theme-dots">
    <div class="theme-dot active" data-theme="default" style="background:#FF006E;color:#FF006E;" title="Default"></div>
    <div class="theme-dot" data-theme="ocean" style="background:#2193b0;color:#2193b0;" title="Ocean"></div>
    <div class="theme-dot" data-theme="sunset" style="background:#ff7e5f;color:#ff7e5f;" title="Sunset"></div>
    <div class="theme-dot" data-theme="forest" style="background:#11998e;color:#11998e;" title="Forest"></div>
    <div class="theme-dot" data-theme="royal" style="background:#8E54E9;color:#8E54E9;" title="Royal"></div>
    <div class="theme-dot" data-theme="retro" style="background:#E56B00;color:#E56B00;" title="Retro"></div>
    <div class="theme-dot" data-theme="dnb" style="background:#00E5FF;color:#00E5FF;" title="DnB"></div>
    <div class="theme-dot" data-theme="skate" style="background:#FF5722;color:#FF5722;" title="Skate"></div>
  </div>

  <div id="hud-hint">🖱️ Drag to orbit · Scroll to zoom · Click glowing objects · Reach Level 50 in Dice Tower</div>

  <div id="content-overlay">
    <div id="content-panel">
      <button id="panel-close" aria-label="Close"><i class="fas fa-times"></i></button>
      <div id="panel-inner"></div>
    </div>
  </div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('three-container');
    const overlay = document.getElementById('content-overlay');
    const panelInner = document.getElementById('panel-inner');
    const closeBtn = document.getElementById('panel-close');
    const hudHint = document.getElementById('hud-hint');
    const vogueBg = document.getElementById('vogue-bg');
    const themeDots = document.querySelectorAll('.theme-dot');

    const themeData = {
      default: { primary: '#FF006E', secondary: '#3A86FF', accent: '#FFBE0B', bgPattern: 'url("https://www.transparenttextures.com/patterns/cartographer.png")', floorGlow: '#FF006E', floorColor2: '#3A86FF' },
      ocean: { primary: '#2193b0', secondary: '#6dd5ed', accent: '#00d2ff', bgPattern: 'url("https://www.transparenttextures.com/patterns/green-forest.png")', floorGlow: '#2193b0', floorColor2: '#6dd5ed' },
      sunset: { primary: '#ff7e5f', secondary: '#feb47b', accent: '#ff9a9e', bgPattern: 'url("https://www.transparenttextures.com/patterns/bright-squares.png")', floorGlow: '#ff7e5f', floorColor2: '#feb47b' },
      forest: { primary: '#11998e', secondary: '#38ef7d', accent: '#5ee7df', bgPattern: 'url("https://www.transparenttextures.com/patterns/beige-paper.png")', floorGlow: '#11998e', floorColor2: '#38ef7d' },
      royal: { primary: '#4776E6', secondary: '#8E54E9', accent: '#FFC75F', bgPattern: 'url("https://www.transparenttextures.com/patterns/45-degree-fabric-light.png")', floorGlow: '#8E54E9', floorColor2: '#4776E6' },
      retro: { primary: '#E56B00', secondary: '#F9A825', accent: '#00BCD4', bgPattern: 'url("https://www.transparenttextures.com/patterns/retina-wood.png")', floorGlow: '#E56B00', floorColor2: '#F9A825' },
      dnb: { primary: '#00E5FF', secondary: '#FF4081', accent: '#7C4DFF', bgPattern: 'url("https://www.transparenttextures.com/patterns/stardust.png")', floorGlow: '#00E5FF', floorColor2: '#FF4081' },
      skate: { primary: '#FF5722', secondary: '#FFEB3B', accent: '#2196F3', bgPattern: 'url("https://www.transparenttextures.com/patterns/graffiti.png")', floorGlow: '#FF5722', floorColor2: '#FFEB3B' }
    };
    let currentTheme = 'default';
    const rootStyle = document.documentElement.style;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2('#05050A', 0.015);
    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5.5, 13);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI / 2 + 0.15;
    controls.minDistance = 2;
    controls.maxDistance = 24;
    controls.target.set(0, 2, 0);

    const interactiveObjects = [];
    const updatables = [];
    let hoveredObject = null;
    let hoveredGroup = null;

    scene.add(new THREE.AmbientLight('#22224a', 1.7));
    const spotLight = new THREE.SpotLight('#ffffff', 45, 32, Math.PI / 4.5, 0.5, 1);
    spotLight.position.set(0, 14, 0);
    spotLight.castShadow = true;
    scene.add(spotLight);
    const lightningLight = new THREE.PointLight('#ffffff', 0, 75);
    lightningLight.position.set(0, 18, 0);
    scene.add(lightningLight);

    // Morphing floor
    const floorSize = 44;
    const floorSegments = 90;
    const floorGeo = new THREE.PlaneGeometry(floorSize, floorSize, floorSegments, floorSegments);
    floorGeo.rotateX(-Math.PI / 2);
    const floorMat = new THREE.MeshStandardMaterial({ color: '#0a0a14', roughness: 0.35, metalness: 0.55, side: THREE.DoubleSide, emissive: '#050505', emissiveIntensity: .12 });
    const floorMesh = new THREE.Mesh(floorGeo, floorMat);
    floorMesh.receiveShadow = true;
    floorMesh.position.y = -0.5;
    scene.add(floorMesh);
    const origFloorY = new Float32Array(floorGeo.attributes.position.array.length);
    floorGeo.attributes.position.array.forEach((v, i) => origFloorY[i] = v);
    let gridHelper = new THREE.GridHelper(floorSize, floorSegments, '#FF006E44', '#1a1a2e22');
    gridHelper.position.y = -0.48;
    gridHelper.material.opacity = 0.28;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Stars / matrix particles
    const starsCount = 950;
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(starsCount * 3);
    const starsCol = new Float32Array(starsCount * 3);
    const starsSizes = new Float32Array(starsCount);
    for (let i = 0; i < starsCount; i++) {
      starsPos[i * 3] = (Math.random() - 0.5) * 55;
      starsPos[i * 3 + 1] = Math.random() * 22 + 1;
      starsPos[i * 3 + 2] = (Math.random() - 0.5) * 55;
      const c = new THREE.Color().setHSL(Math.random() * 0.2 + 0.55, 0.8, 0.6 + Math.random() * 0.4);
      starsCol[i * 3] = c.r; starsCol[i * 3 + 1] = c.g; starsCol[i * 3 + 2] = c.b;
      starsSizes[i] = Math.random() * 0.08 + 0.02;
    }
    starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
    starsGeo.setAttribute('color', new THREE.BufferAttribute(starsCol, 3));
    starsGeo.setAttribute('size', new THREE.BufferAttribute(starsSizes, 1));
    const starsMat = new THREE.PointsMaterial({ size: 0.065, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.76 });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);

    // Matrix rain text sprites
    const matrixGroup = new THREE.Group();
    scene.add(matrixGroup);
    const matrixSprites = [];
    function makeTextSprite(text, color = '#00ff77') {
      const cvs = document.createElement('canvas'); cvs.width = 64; cvs.height = 128;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = 'transparent'; ctx.fillRect(0,0,64,128);
      ctx.fillStyle = color; ctx.font = 'bold 34px Space Mono'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = color; ctx.shadowBlur = 12;
      ctx.fillText(text, 32, 64);
      const tex = new THREE.CanvasTexture(cvs); tex.minFilter = THREE.LinearFilter;
      return new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite:false, depthTest:true, opacity:.55 }));
    }
    for (let i=0;i<70;i++) {
      const ch = Math.random() < .5 ? String(Math.floor(Math.random()*10)) : ['λ','π','Σ','μ','σ','∫','∂','∞'][Math.floor(Math.random()*8)];
      const sp = makeTextSprite(ch);
      sp.position.set((Math.random()-.5)*42, Math.random()*18+4, (Math.random()-.5)*42);
      sp.scale.set(.45,.9,1);
      sp.userData.speed = .25 + Math.random()*1.2;
      matrixGroup.add(sp); matrixSprites.push(sp);
    }

    // Fireworks
    const fwCount = 260;
    const fwGeo = new THREE.BufferGeometry();
    const fwPos = new Float32Array(fwCount * 3);
    const fwCol = new Float32Array(fwCount * 3);
    const fwVel = new Float32Array(fwCount * 3);
    const fwLife = new Float32Array(fwCount);
    for (let i = 0; i < fwCount; i++) { fwPos[i*3]=0; fwPos[i*3+1]=-99; fwPos[i*3+2]=0; fwCol[i*3]=1; fwCol[i*3+1]=1; fwCol[i*3+2]=1; fwLife[i]=0; }
    fwGeo.setAttribute('position', new THREE.BufferAttribute(fwPos, 3));
    fwGeo.setAttribute('color', new THREE.BufferAttribute(fwCol, 3));
    const fwMat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.9 });
    const fireworks = new THREE.Points(fwGeo, fwMat);
    scene.add(fireworks);
    let fwTimer = 0;
    function spawnFirework(cx = (Math.random() - 0.5) * 25, cy = Math.random() * 10 + 3, cz = (Math.random() - 0.5) * 25, overrideColor = null) {
      const col = overrideColor ? new THREE.Color(overrideColor) : new THREE.Color().setHSL(Math.random(), 1, 0.55);
      const burstCount = 80 + Math.floor(Math.random() * 80);
      let idx = 0;

    function drawQuantChart(){ const c=document.getElementById('chart-canvas'); if(!c)return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='#090914'; ctx.fillRect(0,0,c.width,c.height); ctx.strokeStyle='#222'; ctx.lineWidth=1; for(let x=0;x<c.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();} for(let y=0;y<c.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();} const min=Math.min(...quantHistory)-5,max=Math.max(...quantHistory)+5; ctx.strokeStyle='#00E5FF'; ctx.lineWidth=3; ctx.beginPath(); quantHistory.forEach((p,i)=>{const x=i/(quantHistory.length-1)*c.width; const y=c.height-(p-min)/(max-min)*c.height; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}); ctx.stroke(); ctx.fillStyle='#FFBE0B'; ctx.font='14px Orbitron'; ctx.fillText('Price '+quantPrice.toFixed(2),12,22); }
    window.playQuant=function(action){ const vol=6+quantLevel*1.2; const change=(Math.random()-.5)*vol; const newPrice=Math.max(10,quantPrice+change); if(action==='buy'&&change>0)quantBalance+=45+quantLevel*5; else if(action==='sell'&&change<0)quantBalance+=45+quantLevel*5; else quantBalance-=45; quantPrice=newPrice; quantHistory.push(newPrice); quantHistory.shift(); if(quantBalance>1000+quantLevel*300){quantLevel++; localStorage.setItem('geneQuantLevel',quantLevel); spawnFirework();} document.getElementById('balance').textContent=Math.round(quantBalance); const ql=document.getElementById('quant-level'); if(ql) ql.textContent=quantLevel; drawQuantChart(); };

    function initPong(){ const canvas=document.getElementById('pong-canvas'); if(!canvas)return; const ctx=canvas.getContext('2d'); let level=Number(localStorage.getItem('genePongLevel')||1), pScore=0, cScore=0; let ball={x:canvas.width/2,y:canvas.height/2,vx:3+level*.35,vy:2.2}; let py=canvas.height/2-35, cy=canvas.height/2-35; const ph=68, pw=10; const levelEl=document.getElementById('pong-level'); const move=(y)=>{py=Math.max(0,Math.min(canvas.height-ph,y-35));}; canvas.addEventListener('mousemove',e=>move(e.offsetY)); canvas.addEventListener('touchmove',e=>{const r=canvas.getBoundingClientRect(); move(e.touches[0].clientY-r.top); e.preventDefault();},{passive:false}); function reset(dir){ball.x=canvas.width/2;ball.y=canvas.height/2;ball.vx=dir*(3+level*.35);ball.vy=(Math.random()-.5)*5;} function loop(){ctx.fillStyle='#090914';ctx.fillRect(0,0,canvas.width,canvas.height); cy += (ball.y-(cy+ph/2))*(.055+level*.006); ball.x+=ball.vx; ball.y+=ball.vy; if(ball.y<6||ball.y>canvas.height-6)ball.vy*=-1; if(ball.x<22&&ball.y>cy&&ball.y<cy+ph){ball.vx=Math.abs(ball.vx)*1.035; spawnFirework(-9,5,6,'#FF006E');} if(ball.x>canvas.width-22&&ball.y>py&&ball.y<py+ph){ball.vx=-Math.abs(ball.vx)*1.035; spawnFirework(9,5,6,'#00E5FF');} if(ball.x<0){pScore++;reset(1);} if(ball.x>canvas.width){cScore++;reset(-1);} if(pScore>=5){level++;pScore=0;cScore=0;localStorage.setItem('genePongLevel',level);spawnFirework();} levelEl.textContent=level; ctx.fillStyle='#FF006E';ctx.fillRect(10,cy,pw,ph);ctx.fillStyle='#00E5FF';ctx.fillRect(canvas.width-20,py,pw,ph);ctx.fillStyle='#FFBE0B';ctx.beginPath();ctx.arc(ball.x,ball.y,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='16px Orbitron';ctx.fillText(`${cScore} : ${pScore}`,canvas.width/2-22,24); pongLoop=requestAnimationFrame(loop);} if(pongLoop)cancelAnimationFrame(pongLoop); loop(); }

    function playSynthNote(freq){ if(!synthAudioCtx)synthAudioCtx=new(window.AudioContext||window.webkitAudioContext)(); const now=synthAudioCtx.currentTime; const gain=synthAudioCtx.createGain(); gain.connect(synthAudioCtx.destination); if(currentWaveform==='noise'){const buf=synthAudioCtx.createBuffer(1,synthAudioCtx.sampleRate*.25,synthAudioCtx.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=synthAudioCtx.createBufferSource();const filter=synthAudioCtx.createBiquadFilter();filter.type='bandpass';filter.frequency.value=freq;filter.Q.value=1.8;src.buffer=buf;src.connect(filter);filter.connect(gain);gain.gain.setValueAtTime(.18,now);gain.gain.exponentialRampToValueAtTime(.001,now+.25);src.start(now);src.stop(now+.26);} else {const osc=synthAudioCtx.createOscillator(); if(currentWaveform==='fm'){const mod=synthAudioCtx.createOscillator();const mg=synthAudioCtx.createGain();mod.frequency.value=freq*(2+synthLevel*.08);mg.gain.value=freq*.9;mod.connect(mg);mg.connect(osc.frequency);mod.start(now);mod.stop(now+.35);osc.type='sine';} else osc.type=currentWaveform; osc.frequency.setValueAtTime(freq,now); gain.gain.setValueAtTime(.23,now);gain.gain.exponentialRampToValueAtTime(.001,now+.34); osc.connect(gain);osc.start(now);osc.stop(now+.36);} synthPlayed++; if(synthPlayed>=12){synthPlayed=0;synthLevel++;localStorage.setItem('geneSynthLevel',synthLevel); const le=document.getElementById('synth-level'); if(le)le.textContent=synthLevel; spawnFirework();} }

    function initMemory(){ const grid=document.getElementById('memory-grid'); if(!grid)return; let level=Number(localStorage.getItem('geneMemoryLevel')||1); document.getElementById('mem-level').textContent=level; const symbols=['⚡','🎵','📊','🧠','🚀','🎲','💎','🔥']; const deck=[...symbols,...symbols].sort(()=>Math.random()-.5); let first=null, lock=false, moves=0, matched=0; grid.innerHTML=''; deck.forEach((s,i)=>{const card=document.createElement('div');card.className='memory-card';card.textContent='?';card.dataset.symbol=s;card.onclick=()=>{if(lock||card.classList.contains('matched')||card===first)return;card.textContent=s;card.classList.add('flipped'); if(!first){first=card;return;} moves++; document.getElementById('mem-moves').textContent=moves; if(first.dataset.symbol===s){first.classList.add('matched');card.classList.add('matched'); first=null; matched++; document.getElementById('mem-matched').textContent=matched; if(matched===8){level++;localStorage.setItem('geneMemoryLevel',level);document.getElementById('mem-level').textContent=level;spawnFirework();}} else {lock=true; setTimeout(()=>{first.textContent='?';card.textContent='?';first.classList.remove('flipped');card.classList.remove('flipped');first=null;lock=false;},700-Math.min(level*8,350));}}; grid.appendChild(card);}); }

    function initDiceGame(){ diceLevel=Number(localStorage.getItem('geneDiceLevel')||1); diceStreak=0; updateDiceUI(); document.getElementById('dice-small')?.addEventListener('click',()=>playDice('small')); document.getElementById('dice-big')?.addEventListener('click',()=>playDice('big')); }
    function playDice(choice){ const cfg=getDiceConfig(diceLevel); const rolls=Array.from({length:cfg.count},()=>1+Math.floor(Math.random()*cfg.sides)); const total=rolls.reduce((a,b)=>a+b,0); const min=cfg.count,max=cfg.count*cfg.sides,mid=Math.floor((min+max)/2); const result=total<=mid?'small':'big'; document.getElementById('dice-display').textContent = rolls.map(r=>String(r)).join(' + ') + ` = ${total}`; if(choice===result){diceStreak++; document.getElementById('dice-message').textContent=`Correct. ${result.toUpperCase()} roll.`; spawnFirework(); if(diceStreak>=3){diceLevel++;diceStreak=0;localStorage.setItem('geneDiceLevel',diceLevel); if(diceLevel>=50){diceLevel=50;localStorage.setItem('geneDiceLevel',50);showLevel50EasterEgg();}}} else {diceStreak=0; document.getElementById('dice-message').textContent=`Miss. Roll was ${result.toUpperCase()}.`; } updateDiceUI(); }
    function showLevel50EasterEgg(){ const egg=document.createElement('div'); egg.style.cssText="position:fixed;inset:0;z-index:999999;background:radial-gradient(circle at center,rgba(255,190,11,.25),rgba(0,0,0,.96));display:flex;align-items:center;justify-content:center;text-align:center;font-family:Orbitron,sans-serif;color:#fff;"; egg.innerHTML=`<div style="max-width:780px;padding:40px;"><div style="font-size:clamp(2rem,7vw,5rem);color:#FFBE0B;text-shadow:0 0 30px #FFBE0B;">🎲 LEVEL 50 UNLOCKED 🎲</div><div style="margin-top:20px;font-size:1.1rem;letter-spacing:3px;color:#00E5FF;">THE DICE TOWER HAS RECOGNIZED THE QUANT</div><div style="margin-top:30px;font-family:Roboto Mono;line-height:1.8;color:rgba(255,255,255,.85);">Old whip, ancient keys, but the stack is clean.<br>Probability bends when the modeler enters the machine.</div><button id="egg-close" style="margin-top:30px;padding:14px 28px;border:none;border-radius:8px;background:#FFBE0B;color:#000;font-weight:bold;cursor:pointer;">RETURN TO LAB</button></div>`; document.body.appendChild(egg); for(let i=0;i<7;i++)setTimeout(()=>spawnFirework(0,7,-4,'#FFBE0B'),i*230); document.getElementById('egg-close').onclick=()=>egg.remove(); }

    // Interaction and modal safety
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
    function setHoverObject(obj){ if(hoveredObject===obj)return; if(hoveredGroup)hoveredGroup.userData.hovered=false; hoveredObject=obj; hoveredGroup=obj?.userData.group || obj?.parent || null; if(hoveredGroup)hoveredGroup.userData.hovered=true; }
    function openContentForId(id){ if(id && id.startsWith('game_')){ panelInner.innerHTML=renderGame(id); activeGame=id; } else if(stationData[id]){ panelInner.innerHTML=renderStationHTML(stationData[id]); activeGame=null; } else return; overlay.classList.add('active'); hudHint.style.opacity='0'; setTimeout(()=>{ if(activeGame==='game_quant'){drawQuantChart();document.getElementById('btn-buy')?.addEventListener('click',()=>playQuant('buy'));document.getElementById('btn-sell')?.addEventListener('click',()=>playQuant('sell'));} if(activeGame==='game_pong')initPong(); if(activeGame==='game_synth')initSynthUI(); if(activeGame==='game_memory')initMemory(); if(activeGame==='game_type')initTypeRacer(); if(activeGame==='game_dice')initDiceGame(); },120); }
    function handleInteract(x,y){ if(overlay.classList.contains('active'))return; mouse.x=(x/window.innerWidth)*2-1; mouse.y=-(y/window.innerHeight)*2+1; raycaster.setFromCamera(mouse,camera); const intersects=raycaster.intersectObjects(interactiveObjects,true); if(intersects.length>0){ const target=intersects[0].object; const id=target.userData.id || target.parent?.userData?.id; if(id==='resume') { for(let i=0;i<3;i++) setTimeout(()=>spawnFirework(0,7,-7,'#FFBE0B'),i*170); } openContentForId(id); } }
    function closeOverlay(e){ if(e){e.preventDefault();e.stopPropagation();e.stopImmediatePropagation?.();} overlay.classList.remove('active'); hudHint.style.opacity='1'; activeGame=null; if(pongLoop)cancelAnimationFrame(pongLoop); }
    closeBtn.addEventListener('pointerdown', closeOverlay, {capture:true}); closeBtn.addEventListener('click', closeOverlay, {capture:true});
    overlay.addEventListener('pointerdown',(e)=>{ if(e.target===overlay)closeOverlay(e); },{capture:true}); document.getElementById('content-panel').addEventListener('pointerdown',(e)=>e.stopPropagation(),{capture:true});
    window.addEventListener('click',(e)=>{ if(overlay.classList.contains('active') || e.target.closest('#content-overlay') || e.target.closest('#brand-header') || e.target.closest('#theme-dots')) return; handleInteract(e.clientX,e.clientY); });
    window.addEventListener('touchstart',(e)=>{ if(overlay.classList.contains('active'))return; if(e.touches.length>0)handleInteract(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
    window.addEventListener('mousemove',(e)=>{ if(overlay.classList.contains('active'))return; mouse.x=(e.clientX/window.innerWidth)*2-1; mouse.y=-(e.clientY/window.innerHeight)*2+1; raycaster.setFromCamera(mouse,camera); const intersects=raycaster.intersectObjects(interactiveObjects,true); if(intersects.length>0){setHoverObject(intersects[0].object);container.classList.add('pointer-cursor');} else {setHoverObject(null);container.classList.remove('pointer-cursor');} });
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape'&&overlay.classList.contains('active'))closeOverlay(e); });

    const clock = new THREE.Clock();
    function animate(){ requestAnimationFrame(animate); const time=clock.getElapsedTime(); controls.update(); updatables.forEach(fn=>fn(time));
      // scene hover glow scale
      scene.traverse((obj)=>{ if(!obj.userData || !obj.userData.isInteractiveGroup) return; const targetScale=obj.userData.hovered?1.12:1.0; obj.scale.lerp(new THREE.Vector3(targetScale,targetScale,targetScale),.12); if(obj.userData.glowLight)obj.userData.glowLight.intensity=obj.userData.hovered?7:2.3; if(obj.userData.outline)obj.userData.outline.material.opacity=obj.userData.hovered?1:.45; });
      // floor geometry wave
      const posArr=floorGeo.attributes.position.array; for(let i=0;i<posArr.length;i+=3){const x=posArr[i],z=posArr[i+2]; posArr[i+1]=origFloorY[i+1]+Math.sin(x*.6+time*1.3)*Math.cos(z*.5+time*.9)*.22+Math.sin(x*1.1+time*2.1+z*.8)*.14+Math.cos(x*.3+z*1.2+time*.7)*.18;} floorGeo.attributes.position.needsUpdate=true; floorGeo.computeVertexNormals();
      // morph floor colors
      const hue=(time*.035)%1; const groundColor=new THREE.Color().setHSL(hue,.75,.18); const gridColor=new THREE.Color().setHSL((hue+.12)%1,.9,.55); floorMat.color.lerp(groundColor,.025); gridHelper.material.color.lerp(gridColor,.035); spotLight.color.lerp(gridColor,.012);
      // stars and matrix
      const spArr=starsGeo.attributes.position.array; for(let i=0;i<starsCount;i++){spArr[i*3+1]+=Math.sin(time*.4+i*.03)*.008;if(spArr[i*3+1]>22)spArr[i*3+1]=1;if(spArr[i*3+1]<.5)spArr[i*3+1]=.5;} starsGeo.attributes.position.needsUpdate=true; stars.rotation.y+=.0004; stars.rotation.x+=.0002;
      matrixSprites.forEach((sp)=>{sp.position.y-=sp.userData.speed*.018; if(sp.position.y<1){sp.position.y=22; sp.position.x=(Math.random()-.5)*42; sp.position.z=(Math.random()-.5)*42;}});
      // fireworks
      fwTimer += .016; if(fwTimer>1.8+Math.random()*3){fwTimer=0;spawnFirework();} const fpArr=fwGeo.attributes.position.array; for(let i=0;i<fwCount;i++){if(fwLife[i]>0){fwLife[i]-=.016;fpArr[i*3]+=fwVel[i*3]*.016;fpArr[i*3+1]+=fwVel[i*3+1]*.016;fpArr[i*3+2]+=fwVel[i*3+2]*.016;fwVel[i*3+1]-=.012;if(fwLife[i]<=0)fpArr[i*3+1]=-99;}} fwGeo.attributes.position.needsUpdate=true;
      // shooting stars and lightning
      if(Math.random()<.012)spawnShootingStar(); for(let i=shootingStars.length-1;i>=0;i--){const s=shootingStars[i];s.position.addScaledVector(s.userData.vel,.016);s.userData.life-=.016;s.material.opacity=Math.max(0,s.userData.life/1.2); if(s.userData.life<=0){scene.remove(s);shootingStars.splice(i,1);}} if(Math.random()<.0025)triggerLightning();
      renderer.render(scene,camera); }
    animate();
    window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
    applyTheme('default');
  </script>
</body>
