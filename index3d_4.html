<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Gene Boo · Premium Lab</title>
  <meta name="description" content="Gene Boo's futuristic 3D interactive lab — math, code, sound." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&family=Roboto+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--primary:#FF006E;--secondary:#3A86FF;--accent:#FFBE0B;--bg:#050816;--panel:rgba(8,12,24,0.94);--glass:rgba(255,255,255,0.06);--line:rgba(255,255,255,0.18);--cyan:#63F2FF;--blue:#5DA8FF;--violet:#8A7BFF;--white:#FFFFFF;--shadow:0 25px 70px rgba(0,0,0,0.6)}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Roboto Mono',monospace;user-select:none;-webkit-tap-highlight-color:transparent}
    canvas{display:block}
    #canvas-container{position:fixed;inset:0;z-index:1;cursor:grab}
    #canvas-container.pointer-cursor{cursor:pointer}
    #brand-header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px;background:linear-gradient(180deg,rgba(5,8,22,0.94),transparent);pointer-events:none}
    .brand-left{display:flex;gap:12px;align-items:center;pointer-events:auto}
    .brand-face{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.4);box-shadow:0 0 28px var(--accent);animation:face 6s ease-in-out infinite}
    @keyframes face{0%,100%{transform:translateY(0) rotate(0) scale(1)}25%{transform:translateY(-7px) rotate(4deg) scale(1.06)}50%{transform:translateY(4px) rotate(-4deg) scale(.97)}75%{transform:translateY(-2px) rotate(2deg) scale(1.03)}}
    .brand-title{font-family:'Playfair Display';font-size:1.6rem;font-weight:700;background:linear-gradient(90deg,var(--primary),var(--cyan),var(--violet),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .brand-subtitle{font-size:0.7rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
    .nav{display:flex;gap:8px;flex-wrap:wrap;pointer-events:auto;align-items:center}
    .nav button,.switcher,#lbbtn,.env-btn{font-family:'Orbitron';font-size:0.72rem;border:1px solid var(--line);background:var(--glass);color:#fff;border-radius:999px;padding:9px 13px;cursor:pointer;backdrop-filter:blur(12px);text-decoration:none;transition:all 0.3s ease}
    .nav button:hover,.switcher:hover,#lbbtn:hover,.env-btn:hover{background:var(--cyan);border-color:var(--cyan);color:#000;transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,242,255,0.3)}
    #lbbtn{position:fixed;right:18px;bottom:18px;z-index:25;color:var(--accent);border-color:var(--accent);box-shadow:0 0 18px rgba(255,190,11,0.3)}
    #hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:15;color:rgba(255,255,255,0.75);font-family:'Orbitron';font-size:0.74rem;letter-spacing:1.8px;text-shadow:0 0 14px var(--cyan);pointer-events:none;text-align:center;animation:pulse 2.5s infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    #overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.66);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:0.3s}
    #overlay.active{opacity:1;pointer-events:auto}
    #panel{width:min(1080px,93vw);max-height:86vh;overflow:auto;background:var(--panel);border:1px solid rgba(255,255,255,0.15);border-radius:18px;padding:28px;box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,0.05);backdrop-filter:blur(28px);position:relative}
    #panel::before{content:'';position:absolute;inset:-2px;border-radius:20px;padding:2px;background:linear-gradient(135deg,var(--cyan),var(--violet),var(--blue),var(--cyan));background-size:300% 300%;animation:borderSweep 4s ease infinite;-webkit-mask:linear-gradient(#fff,#fff) content-box,linear-gradient(#fff,#fff);mask:linear-gradient(#fff,#fff) content-box,linear-gradient(#fff,#fff);-webkit-mask-composite:xor;mask-composite:exclude;z-index:-1;pointer-events:none}
    @keyframes borderSweep{0%,100%{background-position:0% 50%}25%{background-position:100% 0%}50%{background-position:100% 100%}75%{background-position:0% 100%}}
    #close{position:sticky;top:0;float:right;width:42px;height:42px;border:0;border-radius:50%;font-size:28px;background:rgba(255,255,255,0.12);color:white;cursor:pointer;z-index:2}
    #close:hover{background:var(--primary);transform:rotate(90deg)}
    .modal-title{font-family:'Playfair Display';font-size:clamp(1.8rem,4vw,3rem);background:linear-gradient(90deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .modal-subtitle{color:var(--accent);font-family:'Orbitron';font-size:0.85rem;letter-spacing:2px;margin:5px 0 18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.12)}
    .modal-body{font-family:'Lato';line-height:1.7;color:rgba(255,255,255,0.86)}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:18px}
    .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:18px;backdrop-filter:blur(12px);transition:all 0.3s ease}
    .card:hover{border-color:var(--cyan);transform:translateY(-3px);box-shadow:0 12px 28px rgba(99,242,255,0.15)}
    .ico{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--cyan),var(--violet));font-size:20px;margin-bottom:10px}
    .links{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .links a,.arcbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);color:#fff;text-decoration:none;font-family:'Lato';font-weight:700;cursor:pointer;min-height:40px;backdrop-filter:blur(6px)}
    .links a:hover,.arcbtn:hover{background:var(--cyan);color:#000}
    .arcade{width:100%;min-height:390px;background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:18px;font-family:'Orbitron';text-align:center;box-shadow:inset 0 0 40px rgba(0,229,255,0.12),0 0 32px rgba(0,0,0,0.55);backdrop-filter:blur(14px)}
    .arc-title{font-size:1.45rem;color:var(--accent);text-shadow:0 0 15px currentColor;margin-bottom:10px}
    .hudrow{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;color:#ddd;font-size:0.82rem;margin:8px 0}
    .gamecanvas{max-width:100%;background:#080812;border:2px solid rgba(255,255,255,0.18);border-radius:12px;box-shadow:0 0 22px rgba(0,229,255,0.12);cursor:pointer}
    .lbtable{width:100%;border-collapse:collapse;font-family:'Orbitron';margin-top:14px}
    .lbtable th,.lbtable td{border-bottom:1px solid rgba(255,255,255,0.13);padding:9px;text-align:left}
    .lbtable th{color:var(--accent)}
    .initials{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:12px}
    .initials input{width:90px;text-align:center;text-transform:uppercase;font-family:'Orbitron';font-size:1.2rem;background:#05050a;color:#fff;border:2px solid var(--accent);border-radius:8px;padding:10px}
    .padgrid{display:grid;grid-template-columns:repeat(4,minmax(58px,1fr));gap:10px;max-width:430px;margin:14px auto}
    .drumpad{aspect-ratio:1;border:2px solid rgba(255,255,255,0.22);background:linear-gradient(135deg,#242436,#07070a);border-radius:16px;color:#fff;font-family:'Orbitron';cursor:pointer;box-shadow:inset 0 0 24px rgba(0,0,0,0.6);touch-action:manipulation}
    .drumpad.active,.drumpad:focus{background:var(--accent);color:#000;box-shadow:0 0 24px var(--accent);outline:2px solid #fff;transform:scale(0.96)}
    .controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin:12px auto;max-width:720px}
    .ctrl{background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.13);border-radius:12px;padding:12px;text-align:left;font-size:0.75rem}
    .ctrl label{display:flex;justify-content:space-between;color:rgba(255,255,255,0.75);margin-bottom:7px}
    .ctrl input,.ctrl select{width:100%}
    .piano{position:relative;display:flex;justify-content:center;height:212px;margin:12px auto;touch-action:none}
    .whitekey,.blackkey{border-radius:0 0 10px 10px;border:1px solid rgba(255,255,255,0.25);display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;font-size:0.65rem;white-space:pre-line;cursor:pointer}
    .whitekey{width:42px;height:190px;background:linear-gradient(#fff,#ddd);color:#111}
    .blackkey{position:absolute;width:27px;height:118px;background:linear-gradient(#222,#000);color:#fff;z-index:4}
    .whitekey.active,.blackkey.active{background:var(--accent);box-shadow:0 0 25px var(--accent);transform:translateY(3px);outline:none}
    .touchhelp{color:#999;font-size:0.75rem;margin-top:8px}
    .easter-egg{animation:easterPulse 0.5s ease-in-out 3}
    @keyframes easterPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,190,11,0)}50%{box-shadow:0 0 40px 10px rgba(255,190,11,0.6)}}
    @media (max-width:860px){
      .nav{display:none}
      .brand-title{font-size:1.15rem}
      #panel{padding:18px 12px}
      .piano{transform:scale(0.86);transform-origin:top center;height:188px}
      .whitekey{width:34px}.blackkey{width:22px}
      .padgrid{gap:7px}
      #hint{font-size:0.62rem;width:92%;white-space:normal}
    }

    /* Augmented lab/home-studio/game labels */
    .combochip{display:inline-flex;align-items:center;gap:6px;margin:4px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#fff;font-family:Orbitron;font-size:.72rem}
    .danger{color:#FF6B8B}.good{color:#69F0AE}.gold{color:#FFBE0B}.cyan{color:#63F2FF}
    .memory-flash{animation:memFlash .22s ease-in-out 2}
    @keyframes memFlash{0%,100%{filter:none;transform:scale(1)}50%{filter:drop-shadow(0 0 16px var(--accent));transform:scale(.94)}}
    .arcade{background:radial-gradient(circle at 15% 18%,rgba(255,190,11,.18),transparent 26%),radial-gradient(circle at 83% 20%,rgba(255,0,110,.16),transparent 28%),radial-gradient(circle at 50% 88%,rgba(99,242,255,.14),transparent 32%),linear-gradient(145deg,rgba(16,10,35,.88),rgba(5,12,24,.93));border:1px solid rgba(255,255,255,.24);box-shadow:inset 0 0 46px rgba(255,190,11,.10),0 0 44px rgba(99,242,255,.20),0 20px 70px rgba(0,0,0,.55)}
    .arc-title{letter-spacing:1px;text-transform:uppercase}

  </style>

    class Perlin {
      constructor() {

        for (let i = 0; i < 256; i++) this.p[i] = i;
        for (let i = 255; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [this.p[i], this.p[j]] = [this.p[j], this.p[i]]; }
        for (let i = 0; i < 512; i++) this.perm[i] = this.p[i & 255];
      }
      fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
      lerp(a, b, t) { return a + t * (b - a); }
      grad(hash, x, y, z) {
        const h = hash & 15; const u = h < 8 ? x : y; const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
        return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
      }
      noise(x, y, z) {
        const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
        x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
        const u = this.fade(x), v = this.fade(y), w = this.fade(z);
        const A = this.perm[X] + Y, AA = this.perm[A] + Z, AB = this.perm[A + 1] + Z;
        const B = this.perm[X + 1] + Y, BA = this.perm[B] + Z, BB = this.perm[B + 1] + Z;
        return this.lerp(this.lerp(this.lerp(this.grad(this.perm[AA], x, y, z), this.grad(this.perm[BA], x - 1, y, z), u),
          this.lerp(this.grad(this.perm[AB], x, y - 1, z), this.grad(this.perm[BB], x - 1, y - 1, z), u), v),
          this.lerp(this.lerp(this.grad(this.perm[AA + 1], x, y, z - 1), this.grad(this.perm[BA + 1], x - 1, y, z - 1), u),
          this.lerp(this.grad(this.perm[AB + 1], x, y - 1, z - 1), this.grad(this.perm[BB + 1], x - 1, y - 1, z - 1), u), v), w);
      }

    class FloorSystem {
      constructor(scene) {
        this.scene = scene; this.ripples = []; this.bursts = []; this.initFloor(); this.initSplash();
      }
      initFloor() {
        // Large geometry for vertex displacement
        const geo = new THREE.PlaneGeometry(100, 100, 120, 120);
        geo.rotateX(-Math.PI / 2);
        this.basePos = new Float32Array(geo.attributes.position.array);
        this.floorGeo = geo;

        // Canvas for the evolving colour texture
        this.floorCanvas = document.createElement('canvas');
        this.floorCanvas.width = this.floorCanvas.height = 768;
        this.fctx = this.floorCanvas.getContext('2d');
        this.floorTex = new THREE.CanvasTexture(this.floorCanvas);
        this.floorTex.wrapS = this.floorTex.wrapT = THREE.RepeatWrapping;

        const mat = new THREE.MeshStandardMaterial({
          map: this.floorTex, color: '#ffffff',
          roughness: 0.35, metalness: 0.45,
          emissive: '#050505', emissiveIntensity: 0.16,
          side: THREE.DoubleSide
        });
        this.mesh = new THREE.Mesh(geo, mat);
        this.mesh.position.y = 0; this.mesh.receiveShadow = true; this.scene.add(this.mesh);

        // Grid overlay
        const grid = new THREE.GridHelper(100, 100, '#63F2FF', '#1a2840');
        grid.position.y = 0.01; grid.material.transparent = true; grid.material.opacity = 0.25;

        const g = this.fctx.createRadialGradient(384 + Math.sin(t * 0.35) * 130, 330 + Math.cos(t * 0.28) * 110, 10, 384, 384, 570);
        g.addColorStop(0, `hsl(${(t*45)%360},90%,35%)`);
        g.addColorStop(0.35, `hsl(${(t*45+90)%360},88%,20%)`);
        g.addColorStop(0.7, `hsl(${(t*45+180)%360},90%,12%)`);
        g.addColorStop(1, '#030306');
        this.fctx.fillStyle = g;
        this.fctx.fillRect(0, 0, 768, 768);
        // Moving lines
        for (let i = 0; i < 22; i++) {
          this.fctx.strokeStyle = `hsla(${(t*70+i*19)%360},95%,60%,.12)`;
          this.fctx.lineWidth = 1 + i % 3;
          this.fctx.beginPath();
          const y = (i * 41 + t * 35) % 768;
          this.fctx.moveTo(0, y);

        const vel = new Float32Array(count * 3);
        this.splashLife = new Float32Array(count);
        for (let i = 0; i < count; i++) {
          pos[i * 3] = (Math.random() - 0.5) * 80;
          pos[i * 3 + 1] = -0.5 - Math.random() * 5;
          pos[i * 3 + 2] = (Math.random() - 0.5) * 80;
          const c = new THREE.Color().setHSL(Math.random(), 0.9, 0.6);
          col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b;
          vel[i * 3] = (Math.random() - 0.5) * 0.03;
          vel[i * 3 + 1] = 0.02 + Math.random() * 0.06;
          vel[i * 3 + 2] = (Math.random() - 0.5) * 0.03;
          this.splashLife[i] = Math.random();
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        this.splashVel = vel;
        const mat = new THREE.PointsMaterial({

      addBurst(x, z) { this.bursts.push({ x, z, t: 0 }); }
      update(time, dt, camX, camZ) {
        // Update vertex heights with Perlin noise + ripples + volcanoes

    /* =========================================================
       7.  INTERACTION  MANAGER  (WASD + Boundaries + Raycasting)
       ========================================================= */
    class InteractionManager {
      constructor(camera, renderer, controls, floorSystem) {
        this.camera = camera; this.renderer = renderer; this.controls = controls; this.floorSystem = floorSystem;
        this.raycaster = new THREE.Raycaster(); this.pointer = new THREE.Vector2();
        this.interactables = []; this.hovered = null;
        this.keys = {}; this.moveSpeed = 8.0;
        this.boundary = { minX: -35, maxX: 35, minZ: -42, maxZ: 28 };
        renderer.domElement.addEventListener('pointermove', e => this.onPointerMove(e));
        renderer.domElement.addEventListener('click', e => this.onClick(e));
        renderer.domElement.addEventListener('dblclick', e => this.onDblClick(e));
        window.addEventListener('keydown', e => { if (document.getElementById('overlay')?.classList.contains('active')) return; this.keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { this.keys[e.key.toLowerCase()] = false; });
      }
      registerInteractable(mesh, onClick) { mesh.userData.onClick = onClick; this.interactables.push(mesh); }
      onPointerMove(e) {
        this.pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
        this.raycaster.setFromCamera(this.pointer, this.camera);
        const hits = this.raycaster.intersectObjects(this.interactables, false);
        if (this.hovered) { this.hovered.userData.hovered = false; }
        if (hits.length > 0) { this.hovered = hits[0].object; this.hovered.userData.hovered = true; this.renderer.domElement.classList.add('pointer-cursor'); }
        else { this.hovered = null; this.renderer.domElement.classList.remove('pointer-cursor'); }
      }
      onClick(e) {
        if (this.hovered && this.hovered.userData.onClick) { this.hovered.userData.onClick(this.hovered); return; }
        this.raycaster.setFromCamera(this.pointer, this.camera);
        const floorHits = this.raycaster.intersectObject(this.floorSystem.mesh);
        if (floorHits.length) { this.floorSystem.addRipple(floorHits[0].point.x, floorHits[0].point.z, 0.6); }
      }
      onDblClick(e) {
        this.pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
        this.pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
        this.raycaster.setFromCamera(this.pointer, this.camera);
        const objectHits = this.raycaster.intersectObjects(this.interactables, false);
        if (objectHits.length && objectHits[0].object.userData.onDoubleClick) {
          objectHits[0].object.userData.onDoubleClick(objectHits[0].object);
          return;
        }
        const floorHits = this.raycaster.intersectObject(this.floorSystem.mesh);
        if (floorHits.length) {
          this.floorSystem.addBurst(floorHits[0].point.x, floorHits[0].point.z);
          this.createBurstParticles(floorHits[0].point.x, 0.5, floorHits[0].point.z);
        }
      }
      createBurstParticles(cx, cy, cz) {
        if (!window.burstSystem) {
          const geo = new THREE.BufferGeometry(); const pos = new Float32Array(300 * 3); const col = new Float32Array(300 * 3); const life = new Float32Array(300);
          for (let i = 0; i < 300; i++) { pos[i * 3 + 1] = -999; life[i] = 0; }
          geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
          const mat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
          window.burstSystem = { mesh: new THREE.Points(geo, mat), pos, col, life, vel: new Float32Array(300 * 3) };
          this.scene = this.camera.parent; if (this.scene) this.scene.add(window.burstSystem.mesh);
        }
        const b = window.burstSystem; let used = 0;
        for (let i = 0; i < 300 && used < 80; i++) {
          if (b.life[i] <= 0) {
            b.pos[i * 3] = cx; b.pos[i * 3 + 1] = cy; b.pos[i * 3 + 2] = cz;
            const sp = 1 + Math.random() * 3, th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
            b.vel[i * 3] = Math.sin(ph) * Math.cos(th) * sp; b.vel[i * 3 + 1] = Math.cos(ph) * sp + 0.5; b.vel[i * 3 + 2] = Math.sin(ph) * Math.sin(th) * sp;
            const c = new THREE.Color().setHSL(Math.random(), 1, 0.6); b.col[i * 3] = c.r; b.col[i * 3 + 1] = c.g; b.col[i * 3 + 2] = c.b;
            b.life[i] = 1.5 + Math.random(); used++;
          }
        }
        b.mesh.geometry.attributes.position.needsUpdate = true; b.mesh.geometry.attributes.color.needsUpdate = true;
      }
      updateMovement(dt) {
        if (document.getElementById('overlay')?.classList.contains('active')) { this.keys = {}; return; }
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(this.camera.quaternion); forward.y = 0; forward.normalize();
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(this.camera.quaternion); right.y = 0; right.normalize();
        const move = new THREE.Vector3();
        if (this.keys['w'] || this.keys['arrowup']) move.add(forward);
        if (this.keys['s'] || this.keys['arrowdown']) move.sub(forward);
        if (this.keys['a'] || this.keys['arrowleft']) move.sub(right);
        if (this.keys['d'] || this.keys['arrowright']) move.add(right);
        if (move.length() > 0) { move.normalize().multiplyScalar(this.moveSpeed * dt); this.camera.position.add(move); this.camera.position.x = Math.max(this.boundary.minX, Math.min(this.boundary.maxX, this.camera.position.x)); this.camera.position.z = Math.max(this.boundary.minZ, Math.min(this.boundary.maxZ, this.camera.position.z)); this.controls.target.add(move); this.controls.update(); }
      }
      updateBurst(dt) {
        if (!window.burstSystem) return; const b = window.burstSystem;
        for (let i = 0; i < 300; i++) { if (b.life[i] > 0) { b.life[i] -= dt; b.pos[i * 3] += b.vel[i * 3] * dt; b.pos[i * 3 + 1] += b.vel[i * 3 + 1] * dt; b.pos[i * 3 + 2] += b.vel[i * 3 + 2] * dt; b.vel[i * 3 + 1] -= 2.0 * dt; if (b.life[i] <= 0) b.pos[i * 3 + 1] = -999; } }
        b.mesh.geometry.attributes.position.needsUpdate = true;
      }
    }

      /* ── Neon Pong (with game-over at 5) ── */
      initPong() {
        const [c, x, keys] = this.initCanvasKeys(); if (!c) return;
        let py = c.height / 2 - 42, cy = c.height / 2 - 42, score = 0, ps = 0, cs = 0, running = true;
        const ph = 84;
        let ball = { x: c.width / 2, y: c.height / 2, vx: 4, vy: 2.2 };
        let power = null, shield = 0;
        const reset = (dir) => { ball = { x: c.width / 2, y: c.height / 2, vx: dir * (4 + ps * 0.15), vy: (Math.random() - 0.5) * 4 }; };
        c.addEventListener('mousemove', e => py = Math.max(0, Math.min(c.height - ph, e.offsetY - ph / 2)));
        c.addEventListener('touchmove', e => { const r = c.getBoundingClientRect(); py = Math.max(0, Math.min(c.height - ph, e.touches[0].clientY - r.top - ph / 2)); e.preventDefault(); }, { passive: false });
        const paddleHit = (px, top, isPlayer) => { const rel = ((ball.y - top) / ph - 0.5) * 2; ball.vx = (isPlayer ? -1 : 1) * Math.abs(ball.vx) * 1.045; ball.vy += rel * 3.2; score += isPlayer ? 15 : 0; if (Math.random() < 0.15 && !power) power = { x: c.width / 2, y: 40 + Math.random() * (c.height - 80), type: Math.random() < 0.5 ? 'SLOW' : 'SHIELD' }; };
        const loop = () => {
          if (!running) return;
          x.fillStyle = '#070711'; x.fillRect(0, 0, c.width, c.height);
          cy += (ball.y - (cy + ph / 2)) * (0.06 + ps * 0.005);
          ball.x += ball.vx; ball.y += ball.vy;
          if (ball.y < 7 || ball.y > c.height - 7) ball.vy *= -1;
          if (ball.x < 23 && ball.y > cy && ball.y < cy + ph) paddleHit(18, cy, false);
          if (ball.x > c.width - 23 && ball.y > py && ball.y < py + ph) paddleHit(c.width - 18, py, true);
          if (power) { x.fillStyle = power.type === 'SLOW' ? '#00E5FF' : '#FFBE0B'; x.beginPath(); x.arc(power.x, power.y, 13, 0, Math.PI * 2); x.fill(); if (Math.hypot(ball.x - power.x, ball.y - power.y) < 20) { if (power.type === 'SLOW') { ball.vx *= 0.7; ball.vy *= 0.7; } else shield = 1; score += 80; power = null; } }
          if (ball.x < 0) { cs++; reset(1); } if (ball.x > c.width) { if (shield) { shield = 0; reset(-1); } else { ps++; reset(-1); } }
          if (cs >= 5) { running = false; this.finishGame('game_pong', score); return; }
          x.strokeStyle = '#333'; x.setLineDash([10, 10]); x.beginPath(); x.moveTo(c.width / 2, 0); x.lineTo(c.width / 2, c.height); x.stroke(); x.setLineDash([]);
          x.fillStyle = '#FF006E'; x.fillRect(10, cy, 12, ph); x.fillStyle = '#00E5FF'; x.fillRect(c.width - 22, py, 12, ph); x.fillStyle = '#FFBE0B'; x.beginPath(); x.arc(ball.x, ball.y, 7, 0, Math.PI * 2); x.fill();
          x.fillStyle = '#fff'; x.font = '18px Orbitron'; x.fillText(`${ps} : ${cs}`, c.width / 2 - 32, 26);
          document.getElementById('score').textContent = `Score ${score}`;
          document.getElementById('level').textContent = `Level ${ps+1}`;
          document.getElementById('status').textContent = shield ? 'Shield active' : (power ? `Powerup ${power.type}` : 'Curve by paddle impact');
          this.gameRAF = requestAnimationFrame(loop);
        };
        loop(); this.addCleanup(() => { running = false; this.finishGame('game_pong', score); });
      }

      /* ── Letter Rain ── */
      initLetters() {
        const [c, x, keys] = this.initCanvasKeys(); if (!c) return;
        let score = 0, combo = 0, frame = 0, time = 90, running = true;
        const drops = [];
        const timer = setInterval(() => { time--; if (time <= 0) { clearInterval(timer); running = false; this.finishGame('game_letters', score); } }, 1000);
        this.addCleanup(() => clearInterval(timer));
        const loop = () => {
          if (!running) return;
          x.fillStyle = '#070711'; x.fillRect(0, 0, c.width, c.height);
          x.fillStyle = 'rgba(0,255,120,0.14)'; x.fillRect(0, 245, c.width, 42); x.fillStyle = 'rgba(255,190,11,0.13)'; x.fillRect(0, 287, c.width, 32);
          if (frame % Math.max(12, 45 - Math.floor(score / 150)) === 0) drops.push({ x: 25 + Math.random() * (c.width - 50), y: -20, ch: Math.random() < 0.08 ? '💣' : 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'[Math.floor(Math.random() * 26)], v: 1.4 + Math.random() * 1.2 + score / 900 });
          for (let i = drops.length - 1; i >= 0; i--) { const d = drops[i]; d.y += d.v; x.font = d.ch === '💣' ? '24px Orbitron' : '22px Orbitron'; x.fillStyle = d.ch === '💣' ? '#FF006E' : '#fff'; x.fillText(d.ch, d.x, d.y); const k = d.ch !== '💣' && keys[d.ch.toLowerCase()] || keys[d.ch]; if (k && d.y > 245 && d.y < 319) { keys[d.ch.toLowerCase()] = false; keys[d.ch] = false; combo++; score += (d.y < 287 ? 30 : 10) * Math.max(1, Math.floor(combo / 5)); drops.splice(i, 1); continue; } if (d.ch === '💣' && d.y > 245 && d.y < 319 && Object.values(keys).some(Boolean)) { score = Math.max(0, score - 100); combo = 0; drops.splice(i, 1); continue; } if (d.y > c.height + 30) { combo = 0; drops.splice(i, 1); } }
          document.getElementById('score').textContent = `Score ${score}`; document.getElementById('level').textContent = `Combo ${combo}`; document.getElementById('status').textContent = `Time ${time}s`;

      /* ── Neon Racer (fixed obstacle following) ── */
      initRacer() {

        let px = 0, frame = 0, score = 0, level = 1, speed = 3, dead = false, running = true;
        let obs = [], boosts = [];
        const loop = () => {
          if (!running) return;
          x.fillStyle = '#030915'; x.fillRect(0, 0, c.width, c.height);
          const rd = c.width * 0.62, h = 70;
          if (!dead) {
            if (keys.ArrowLeft || keys.a) px -= 3; if (keys.ArrowRight || keys.d) px += 3; px = Math.max(-rd / 2 + 24, Math.min(rd / 2 - 24, px));
            if (frame % 28 === 0) obs.push({ x: (Math.random() - 0.5) * rd * 1.1, z: 0, type: Math.random() < 0.25 ? 'mine' : 'car' });
            if (frame % 220 === 0) boosts.push({ x: (Math.random() - 0.5) * rd * 0.9, z: 0 });
            obs.forEach(o => o.z += 0.018 * speed); boosts.forEach(o => o.z += 0.018 * speed);
            obs = obs.filter(o => o.z < 1.15); boosts = boosts.filter(o => o.z < 1.15);
            for (const o of obs) if (o.z > 0.86 && o.z < 1.02 && Math.abs((o.x - px)) < 25) { dead = true; setTimeout(() => { running = false; this.finishGame('game_racer', score); }, 300); }
            for (const b of boosts) if (b.z > 0.86 && b.z < 1.02 && Math.abs((b.x - px)) < 28) { score += 300; speed += 0.8; b.dead = true; }

      /* ── Bubble Burst (classic shooter) ── */
      initBubble() {
        const [c, x, keys] = this.initCanvasKeys(); if (!c) return;
        const COLS = 9, ROWS = 12, RADIUS = 14, COLORS = ['#FF006E','#00E5FF','#FFBE0B','#38ef7d','#9B5DE5','#FF4500'];
        let grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
        let bubble = { x: c.width/2, y: c.height - 30, color: COLORS[Math.floor(Math.random()*COLORS.length)] }, running = true, score = 0, level = 1, nextColor = COLORS[Math.floor(Math.random()*COLORS.length)];
        let dropTimer = 0, dropInterval = 8000, frame = 0;
        // initialize some bubbles
        for (let r = 0; r < 5; r++) for (let cl = 0; cl < COLS; cl++) if (Math.random()<0.7) grid[r][cl] = COLORS[Math.floor(Math.random()*COLORS.length)];
        const drawBubble = (cx, cy, color) => { x.fillStyle = color; x.beginPath(); x.arc(cx, cy, RADIUS, 0, Math.PI*2); x.fill(); x.strokeStyle='#fff'; x.lineWidth=1; x.stroke(); };
        const draw = () => {
          x.fillStyle = '#0a0a1a'; x.fillRect(0,0,c.width,c.height);
          const ox = (c.width - COLS * RADIUS*2)/2 + RADIUS, oy = 40 + RADIUS;
          for (let r = 0; r < ROWS; r++) for (let cl = 0; cl < COLS; cl++) {
            if (grid[r][cl]) drawBubble(ox + cl * RADIUS*2, oy + r * RADIUS*2, grid[r][cl]);
          }
          drawBubble(bubble.x, bubble.y, bubble.color);
          document.getElementById('score').textContent = `Score ${score}`; document.getElementById('level').textContent = `Level ${level}`; document.getElementById('status').textContent = `Next: `; 
          const status = document.getElementById('status'); if (status) status.innerHTML += `<span style="display:inline-block; width:14px; height:14px; background:${nextColor}; border-radius:50%; vertical-align:middle;"></span>`;
        };
        const shoot = (tx, ty) => {
          const ox = (c.width - COLS * RADIUS*2)/2 + RADIUS, oy = 40 + RADIUS;
          let col = Math.round((tx - ox) / (RADIUS*2)), row = Math.round((ty - oy) / (RADIUS*2));
          if (col<0||col>=COLS||row<0||row>=ROWS) return;
          if (!grid[row][col]) {
            // drop down
            let finalRow = row;
            while (finalRow+1 < ROWS && !grid[finalRow+1][col]) finalRow++;
            grid[finalRow][col] = bubble.color;
          }
          // check matches
          const remove = [];
          const visited = new Set();
          const flood = (r, cl, color) => {
            if (r<0||r>=ROWS||cl<0||cl>=COLS||visited.has(r*COLS+cl)) return 0;
            if (grid[r][cl] !== color) return 0;
            visited.add(r*COLS+cl);
            return 1 + flood(r+1,cl,color)+flood(r-1,cl,color)+flood(r,cl+1,color)+flood(r,cl-1,color);
          };
          for (let r=0; r<ROWS; r++) for (let cl=0; cl<COLS; cl++) {
            if (grid[r][cl]) {
              const size = flood(r,cl,grid[r][cl]);
              if (size >= 3) remove.push({r,cl});
            }
          }
          if (remove.length>0) {
            remove.forEach(({r,cl}) => grid[r][cl]=null);
            score += remove.length*20;
            // drop disconnected
            const connected = new Set();
            const flood2 = (r,cl) => {
              if (r<0||r>=ROWS||cl<0||cl>=COLS||connected.has(r*COLS+cl)||!grid[r][cl]) return;
              connected.add(r*COLS+cl);
              flood2(r+1,cl); flood2(r-1,cl); flood2(r,cl+1); flood2(r,cl-1);
            };
            for (let cl=0; cl<COLS; cl++) if (grid[ROWS-1][cl]) flood2(ROWS-1,cl);
            for (let r=0; r<ROWS; r++) for (let cl=0; cl<COLS; cl++) {
              if (grid[r][cl] && !connected.has(r*COLS+cl)) { grid[r][cl]=null; score+=5; }
            }
          }
          bubble.color = nextColor; nextColor = COLORS[Math.floor(Math.random()*COLORS.length)];
        };
        c.addEventListener('click', e => { const rect = c.getBoundingClientRect(); shoot(e.clientX - rect.left, e.clientY - rect.top); draw(); });
        const update = (dt) => {
          dropTimer += dt;
          if (dropTimer >= dropInterval) {
            dropTimer = 0;
            // shift rows down
            for (let r = ROWS-2; r>=0; r--) for (let cl=0; cl<COLS; cl++) grid[r+1][cl] = grid[r][cl];
            for (let cl=0; cl<COLS; cl++) grid[0][cl] = Math.random()<0.5 ? COLORS[Math.floor(Math.random()*COLORS.length)] : null;
            level++; dropInterval = Math.max(2000, 8000 - level*400);
          }
          frame++;
        };
        let last = performance.now();
        const loop = (now) => { if (!running) return; const dt = now-last; last=now; update(dt); draw(); this.gameRAF = requestAnimationFrame(loop); };
        this.gameRAF = requestAnimationFrame(loop);
      }
    }

          this.bloom.resolution.set(window.innerWidth, window.innerHeight);
        });
      }


      createRainbowExplosion(position, count = 180) {
        this.explosions ??= [];
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3), col = new Float32Array(count * 3), vel = new Float32Array(count * 3), life = new Float32Array(count);
        for (let i=0;i<count;i++) {
          pos[i*3] = position.x; pos[i*3+1] = position.y + 0.35; pos[i*3+2] = position.z;
          const sp = 1.1 + Math.random()*3.2, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1);
          vel[i*3] = Math.sin(ph)*Math.cos(th)*sp; vel[i*3+1] = Math.abs(Math.cos(ph))*sp + .5; vel[i*3+2] = Math.sin(ph)*Math.sin(th)*sp;
          const c = new THREE.Color().setHSL(Math.random(), 1, .6); col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b; life[i] = .9 + Math.random()*1.1;
        }
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3)); geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
        const mat = new THREE.PointsMaterial({ size:.14, vertexColors:true, transparent:true, opacity:.95, blending:THREE.AdditiveBlending, depthWrite:false });
        const points = new THREE.Points(geo, mat); this.scene.add(points); this.explosions.push({ points, pos, vel, life, max:2.1 });
      }
      explodeMover(group) {
        if (!group || group.userData.exploding) return;
        group.userData.exploding = true; this.createRainbowExplosion(group.position, 220);
        group.visible = false;
        setTimeout(() => { group.position.x = (Math.random()-.5)*18; group.position.z = (Math.random()-.5)*15 + 1.5; group.visible = true; group.userData.exploding = false; }, 1200 + Math.random()*900);
      }
      updateMovingDecor(dt, time) {
        if (!this.movers) return;
        this.movers.forEach(m => {
          const g = m.group; if (!g.visible) return;
          m.change -= dt; if (m.change <= 0 || !isFinite(m.dir.x)) { m.dir.set(Math.random()-.5,0,Math.random()-.5).normalize(); m.change = 1.0 + Math.random()*2.2; }
          g.position.addScaledVector(m.dir, m.speed * dt);
          const minX=-16,maxX=16,minZ=-8,maxZ=10;
          if (g.position.x<minX || g.position.x>maxX) { m.dir.x *= -1; g.position.x=Math.max(minX,Math.min(maxX,g.position.x)); }
          if (g.position.z<minZ || g.position.z>maxZ) { m.dir.z *= -1; g.position.z=Math.max(minZ,Math.min(maxZ,g.position.z)); }
          g.rotation.y = Math.atan2(m.dir.x, m.dir.z) + Math.sin(time*1.7 + m.spin)*0.08;
          g.position.y = m.baseY + Math.sin(time*3 + m.spin)*0.025;
        });
      }
      updateExplosions(dt) {
        if (!this.explosions) return;
        for (let e=this.explosions.length-1;e>=0;e--) {
          const ex = this.explosions[e]; let alive = 0;
          for (let i=0;i<ex.life.length;i++) if (ex.life[i] > 0) { ex.life[i] -= dt; alive++; ex.pos[i*3] += ex.vel[i*3]*dt; ex.pos[i*3+1] += ex.vel[i*3+1]*dt; ex.pos[i*3+2] += ex.vel[i*3+2]*dt; ex.vel[i*3+1] -= 3.2*dt; }
          ex.points.geometry.attributes.position.needsUpdate = true; ex.points.material.opacity = Math.max(0, ex.points.material.opacity - dt*.45);
          if (!alive) { this.scene.remove(ex.points); ex.points.geometry.dispose(); ex.points.material.dispose(); this.explosions.splice(e,1); }
        }
      }
      updateFlyingDecor(dt, time) {
        if (!this.flyers) return;
        this.flyers.forEach((f, i) => {
          f.angle += dt * f.speed;
          const wob = Math.sin(time * f.wobble + i) * f.wobbleAmp;
          f.group.position.set(Math.cos(f.angle)*f.radius, f.height + wob, Math.sin(f.angle)*f.radius + f.zOffset);
          f.group.rotation.y = -f.angle + Math.PI/2;
          f.group.rotation.z = Math.sin(time*2 + i)*0.12;
        });
      }

      updateFormulaBoard(time) {
        if (!this.formulaBoard) return;
        const formulas = [
          {name:'BLACK-SCHOLES', lines:['Black-Scholes-Merton:', 'C = S N(d1) - K e^{-rt} N(d2)', 'd1 = [ln(S/K)+(r+σ²/2)t] / σ√t', 'd2 = d1 - σ√t']},
          {name:'SABR', lines:['SABR Stochastic Volatility:', 'dF = α F^β dW1', 'dα = να dW2', 'corr(dW1,dW2)=ρ']},
          {name:'HESTON', lines:['Heston Model:', 'dS = μSdt + √v S dW1', 'dv = κ(θ-v)dt + ξ√v dW2', 'corr(dW1,dW2)=ρ']},
          {name:'HW1F', lines:['Hull-White One-Factor:', 'dr = [θ(t) - a r]dt + σ dW', 'P(t,T) = A(t,T) exp(-B(t,T) r_t)', 'mean reversion · short-rate lattice']},
          {name:'DUPIRE', lines:['Dupire Local Volatility:', '∂C/∂T = 0.5 σ²(K,T) K² ∂²C/∂K²', 'σ²(K,T) = [∂C/∂T] / [0.5K²∂²C/∂K²]', 'surface → local dynamics']}
        ];
        const cycle = 9.2, total = formulas.length * cycle, u = (time % total) / cycle, idx = Math.floor((time % total) / cycle), phase = u - idx;
        const f = formulas[idx]; const key = idx + ':' + Math.floor(phase * 64);
        if (key === this.formulaBoard.lastKey) return; this.formulaBoard.lastKey = key;
        const c = this.formulaBoard.canvas, x = this.formulaBoard.ctx;
        x.fillStyle = '#07160f'; x.fillRect(0,0,c.width,c.height); x.strokeStyle='rgba(255,255,255,.28)'; x.lineWidth=8; x.strokeRect(16,16,992,480);
        x.fillStyle='rgba(255,255,255,.88)'; x.font='italic 34px Playfair Display';
        let reveal = phase < .58 ? phase/.58 : (phase < .78 ? 1 : Math.max(0, 1 - (phase-.78)/.22));
        const all = f.lines.join('\n'); const n = Math.floor(all.length * reveal); const visible = all.slice(0,n).split('\n');
        visible.forEach((line,i)=>{ x.font = i===0 ? 'italic 34px Playfair Display' : '34px Roboto Mono'; x.fillStyle = i===0 ? '#FFBE0B' : 'rgba(255,255,255,.9)'; x.fillText(line, 58, 86 + i*62); });
        if (phase > .78) { x.fillStyle = `rgba(7,22,15,${Math.min(0.88,(phase-.78)*4)})`; x.fillRect(40,55,930,350); }
        x.font='italic 28px Playfair Display'; x.fillStyle='#63F2FF'; x.fillText('Animated quant chalkboard · type → erase → next model', 58, 452);
        this.formulaBoard.tex.needsUpdate = true;
      }

      animate() {
        requestAnimationFrame(() => this.animate());
        const dt = Math.min(this.clock.getDelta(), 0.1); const t = performance.now() * 0.001;
        this.controls.update();
        this.interactionManager.updateMovement(dt);
        this.floorSystem.update(t, dt, this.camera.position.x, this.camera.position.z);
        this.ceilingSystem.update(t, dt);
        this.arcadeSystem.update(t);
        this.updateFormulaBoard(t);
        this.updateMovingDecor(dt, t);
        this.updateFlyingDecor(dt, t);
        this.updateExplosions(dt);
        this.interactionManager.updateBurst(dt);
        if (this.fallers) this.fallers.forEach(sp => { sp.position.y -= sp.userData.speed; if (sp.position.y < -2) { sp.position.y = 24; sp.position.x = (Math.random() - 0.5) * 44; sp.position.z = (Math.random() - 0.5) * 50; } });
        this.composer.render();
      }
    }

    const app = new PortfolioApp();
  </script>
